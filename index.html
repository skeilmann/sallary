<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Dashboard - IFP & FILATO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --accent: #3b82f6;
    --accent2: #10b981; --accent3: #f59e0b; --danger: #ef4444;
    --ifp: #3b82f6; --filato: #10b981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); padding: 24px 32px; border-bottom: 1px solid var(--surface2); }
  .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .header p { color: var(--text2); font-size: 14px; }

  .controls { display: flex; gap: 10px; padding: 14px 32px; background: var(--surface); border-bottom: 1px solid var(--surface2); flex-wrap: wrap; align-items: center; }
  .btn { padding: 7px 16px; border: 1px solid var(--surface2); background: var(--bg); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.ifp-active { background: var(--ifp); border-color: var(--ifp); }
  .btn.filato-active { background: var(--filato); border-color: var(--filato); }
  .btn.both-active { background: linear-gradient(135deg, var(--ifp), var(--filato)); border-color: var(--accent); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  .separator { width: 1px; height: 30px; background: var(--surface2); }
  .label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  .main { padding: 24px 32px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); position: relative; }
  .kpi-card .kpi-label { color: var(--text2); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .kpi-card .kpi-value { font-size: 26px; font-weight: 700; }
  .kpi-card .kpi-change { font-size: 13px; margin-top: 4px; }
  .kpi-card .kpi-change.positive { color: var(--accent2); }
  .kpi-card .kpi-change.negative { color: var(--danger); }
  .kpi-card .kpi-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .chart-card canvas { max-height: 350px; }

  .table-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); margin-bottom: 24px; overflow-x: auto; }
  .table-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--surface2); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pos { color: var(--accent2); }
  .neg { color: var(--danger); }
  .bold { font-weight: 700; }
  .subtotal { background: rgba(255,255,255,0.03); font-weight: 600; }

  /* Tooltip styles */
  .info-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--surface2); color: var(--text2); font-size: 10px; font-weight: 700; cursor: help; position: relative; flex-shrink: 0; }
  .info-icon:hover { background: var(--accent); color: white; }

  .tooltip-wrap { position: relative; display: inline-flex; align-items: center; }
  .tooltip-content { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 1px solid var(--accent); border-radius: 10px; padding: 14px 16px; font-size: 12px; line-height: 1.5; color: var(--text); width: 340px; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: none; }
  .tooltip-content::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--accent); }
  .tooltip-wrap:hover .tooltip-content { display: block; }
  .tooltip-content .tt-title { font-weight: 700; color: var(--accent); margin-bottom: 4px; font-size: 12px; }
  .tooltip-content .tt-law { font-size: 10px; color: var(--accent3); margin-top: 6px; font-style: italic; }
  .tooltip-content .tt-law-ro { color: var(--accent2); }

  .td-item { display: flex; align-items: center; gap: 8px; }

  .chat-section { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); margin-bottom: 24px; }
  .chat-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 12px 16px; background: var(--bg); border: 1px solid var(--surface2); border-radius: 8px; color: var(--text); font-size: 14px; }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-btn { padding: 12px 24px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; }
  .chat-results { margin-top: 16px; padding: 16px; background: var(--bg); border-radius: 8px; font-size: 14px; line-height: 1.6; display: none; }
  .quick-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .quick-btn { padding: 6px 14px; background: var(--bg); border: 1px solid var(--surface2); border-radius: 20px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); }

  .company-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-ifp { background: rgba(59,130,246,0.2); color: var(--ifp); }
  .badge-filato { background: rgba(16,185,129,0.2); color: var(--filato); }

  .currency-tag { font-size: 14px; color: var(--text2); font-weight: 400; }
  .rate-note { font-size: 11px; color: var(--text2); font-style: italic; padding-left: 4px; }

  /* Expandable rows */
  .expandable-parent { cursor: pointer; transition: background 0.2s; }
  .expandable-parent:hover td { background: rgba(59,130,246,0.08) !important; }
  .expandable-parent td:first-child .td-item::before { content: '▶'; display: inline-block; font-size: 9px; margin-right: 8px; transition: transform 0.3s; color: var(--accent); }
  .expandable-parent.expanded td:first-child .td-item::before { transform: rotate(90deg); }
  .child-row { display: none; }
  .child-row.visible { display: table-row; }
  .child-row td { padding-left: 36px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .child-row td:first-child { color: var(--text2); }
  .child-row .child-bar { display: inline-block; height: 6px; border-radius: 3px; margin-left: 8px; vertical-align: middle; min-width: 4px; }
  .child-bar-ifp { background: var(--ifp); }
  .child-bar-filato { background: var(--filato); }

  /* Chart detail popup */
  .chart-popup { position: fixed; z-index: 2000; background: #1a1a2e; border: 1px solid var(--accent); border-radius: 12px; padding: 18px 22px; min-width: 320px; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.7); color: var(--text); font-size: 13px; line-height: 1.6; pointer-events: auto; }
  .chart-popup .popup-title { font-weight: 700; font-size: 15px; color: var(--accent); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .chart-popup .popup-close { cursor: pointer; font-size: 18px; color: var(--text2); background: none; border: none; padding: 0 4px; }
  .chart-popup .popup-close:hover { color: var(--danger); }
  .chart-popup .popup-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .chart-popup .popup-row:last-child { border-bottom: none; }
  .chart-popup .popup-label { color: var(--text2); }
  .chart-popup .popup-value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .chart-popup .popup-bar-wrap { height: 8px; background: var(--surface2); border-radius: 4px; margin-top: 8px; overflow: hidden; }
  .chart-popup .popup-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .chart-popup .popup-section { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--surface2); }
  .chart-popup .popup-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 6px; }
  .chart-popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1999; background: rgba(0,0,0,0.3); }

  /* Tabbed popup styles */
  .popup-tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid var(--surface2); padding-bottom: 8px; }
  .popup-tab { padding: 6px 14px; border: none; background: none; color: var(--text2); font-size: 12px; cursor: pointer; border-radius: 6px 6px 0 0; font-weight: 600; }
  .popup-tab.active { background: var(--accent); color: white; }
  .popup-tab-content { display: none; }
  .popup-tab-content.active { display: block; }
  .popup-acct-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
  .popup-acct-row:last-child { border-bottom: none; }
  .popup-acct-code { color: var(--accent); font-weight: 600; font-family: monospace; min-width: 48px; }
  .popup-acct-name { flex: 1; color: var(--text); margin: 0 8px; }
  .popup-acct-human { font-size: 11px; color: var(--text2); font-style: italic; margin-top: 2px; }
  .popup-acct-amount { text-align: right; font-weight: 600; color: var(--accent2); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .popup-acct-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 3px; overflow: hidden; }
  .popup-acct-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  .insight-card { background: var(--surface); border-radius: 12px; padding: 16px; border: 1px solid var(--surface2); margin-bottom: 16px; }
  .insight-card h4 { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .insight-card .insight-content { font-size: 13px; line-height: 1.6; }
  .insight-card .insight-item { display: flex; gap: 8px; margin-bottom: 6px; }
  .insight-card .insight-item::before { content: '•'; color: var(--accent2); font-weight: 700; flex-shrink: 0; }

  /* ─── DETAILS SECTION ─── */
  .category-card { background: var(--surface); border-radius: 12px; padding: 16px; border: 2px solid var(--surface2); cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .category-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
  .category-card.expanded { border-color: var(--accent); background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(16,185,129,0.05)); }
  .category-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; }
  .category-icon { font-size: 28px; }
  .category-info { flex: 1; }
  .category-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .category-amount { font-size: 16px; font-weight: 700; color: var(--accent); }
  .category-pct { font-size: 11px; color: var(--text2); }
  .category-human { font-size: 12px; color: var(--text2); font-style: italic; margin-top: 8px; line-height: 1.4; }
  .category-items { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--surface2); }
  .category-card.expanded .category-items { display: block; }
  .category-item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .category-item-row:last-child { border-bottom: none; }
  .category-item-name { color: var(--text2); flex: 1; }
  .category-item-amount { text-align: right; font-weight: 600; color: var(--accent2); font-variant-numeric: tabular-nums; }

  .waterfall-chart-wrap { display: flex; align-items: flex-end; gap: 4px; height: 280px; margin: 20px 0; padding: 20px 0; border-bottom: 1px solid var(--surface2); }
  .waterfall-bar { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .waterfall-bar-fill { border-radius: 4px 4px 0 0; width: 100%; transition: all 0.3s; min-height: 4px; }
  .waterfall-positive { background: linear-gradient(180deg, var(--accent2), rgba(16,185,129,0.5)); }
  .waterfall-negative { background: linear-gradient(180deg, var(--danger), rgba(239,68,68,0.5)); }
  .waterfall-bar-label { font-size: 10px; margin-top: 4px; color: var(--text2); text-align: center; line-height: 1.2; }
  .waterfall-bar-value { font-size: 10px; font-weight: 600; margin-top: 2px; color: var(--text); }

  .notice-card { background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(239, 68, 68, 0.1)); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 12px; padding: 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .notice-icon { font-size: 24px; flex-shrink: 0; }
  .notice-content { flex: 1; }
  .notice-title { font-weight: 600; color: var(--accent3); margin-bottom: 4px; }
  .notice-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .notice-btn { padding: 8px 16px; background: var(--accent3); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin-top: 8px; }
  .notice-btn:hover { opacity: 0.9; }

  .warning-card { background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(245, 158, 11, 0.05)); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
  .warning-title { font-weight: 700; color: var(--danger); font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .warning-content { font-size: 13px; color: var(--text); line-height: 1.6; }
  .warning-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(239,68,68,0.2); }
  .warning-row:last-child { border-bottom: none; }
  .warning-label { color: var(--text2); }
  .warning-value { font-weight: 700; color: var(--danger); }

  .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .detail-note { font-size: 12px; color: var(--text2); font-style: italic; }

  .top-expenses-table { width: 100%; font-size: 13px; }
  .top-expenses-table th { padding: 10px; text-align: left; background: var(--bg); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  .top-expenses-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .top-expenses-table tr:hover td { background: rgba(255,255,255,0.02); }
  .top-expenses-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .rank-badge { display: inline-block; background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 11px; }

  .cash-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .cash-card { background: var(--bg); border: 1px solid var(--surface2); border-radius: 10px; padding: 14px; text-align: center; }
  .cash-card-label { font-size: 11px; color: var(--text2); text-transform: uppercase; margin-bottom: 6px; }
  .cash-card-amount { font-size: 18px; font-weight: 700; color: var(--accent); }

  /* ─── COLLAPSIBLE SECTIONS ─── */
  .collapsible-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--surface2); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.2s; margin-bottom: 12px; margin-right: 8px; }
  .collapsible-toggle:hover { border-color: var(--accent); background: rgba(59,130,246,0.1); }
  .collapsible-toggle .arrow { transition: transform 0.3s; display: inline-block; font-size: 11px; }
  .collapsible-toggle.open .arrow { transform: rotate(90deg); }
  .collapsible-body { display: none; animation: fadeSlide 0.3s ease; }
  .collapsible-body.visible { display: block; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── TRAFFIC LIGHT DOTS ─── */
  .tl-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
  .tl-green { background: #10b981; }
  .tl-yellow { background: #f59e0b; }
  .tl-red { background: #ef4444; }

  /* ─── KPI EXPLANATIONS ─── */
  .kpi-explanation { font-size: 12px; color: var(--text2); line-height: 1.4; margin-top: 8px; padding: 8px; background: rgba(59,130,246,0.05); border-radius: 6px; }

  /* ─── NARRATIVE & FLOW CARDS ─── */
  .narrative-card { background: var(--surface); border-radius: 12px; padding: 16px; border: 1px solid var(--surface2); margin-bottom: 16px; }
  .narrative-content { font-size: 13px; line-height: 1.6; color: var(--text); }
  .flow-diagram { margin: 16px 0; padding: 16px; background: var(--bg); border-radius: 8px; border: 1px solid var(--surface2); }
  .flow-box { display: inline-block; padding: 12px 16px; background: var(--surface2); border-radius: 8px; font-weight: 600; font-size: 13px; margin: 0 8px; }
  .flow-arrow { display: inline-block; margin: 0 8px; color: var(--accent); font-weight: 700; }

  /* ─── CASH FLOW WATERFALL SIMPLE ─── */
  .cashflow-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .cashflow-item:last-child { border-bottom: none; }
  .cashflow-label { color: var(--text2); }
  .cashflow-value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .cashflow-add { color: var(--accent2); }
  .cashflow-subtract { color: var(--danger); }

  @media (max-width: 900px) {
    .charts-grid { grid-template-columns: 1fr; }
    .controls { padding: 10px 14px; gap: 6px; }
    .main { padding: 14px; }
    .tooltip-content { width: 260px; left: 0; transform: none; }
    .chart-popup { min-width: 280px; max-width: 95vw; left: 2.5vw !important; }
    .waterfall-chart-wrap { flex-direction: column; height: auto; gap: 2px; }
    .waterfall-bar-label { font-size: 9px; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1 id="hdr-title">Dashboard Financiar</h1>
  <p id="hdr-sub"></p>
</div>

<div class="controls" id="ctrl-bar">
</div>

<div class="main" id="main-content"></div>

<script>
// ─── STATE ───
let lang = 'ro';       // 'ro' | 'it'
let currency = 'RON';  // 'RON' | 'EUR'
let currentView = 'BOTH';
let currentSection = 'overview';
let charts = {};
const EUR_RATE = 5.00;

// ─── TRANSLATIONS ───
const T = {
  ro: {
    title: 'Dashboard Financiar',
    sub: 'IFP FILATI PREGIATI & FILATO A MODO TUO — Situații financiare anuale 2024–2025',

    overview: 'Prezentare', balance: 'Bilanț', profitloss: 'Profit & Pierdere', compare: 'Comparație',
    both: 'Ambele companii', revenue: 'Cifra de afaceri', netProfit: 'Profit net', profitMargin: 'Marja de profit',
    totalAssets: 'Total active', vs: 'față de', employees: 'Angajați', revPerEmp: 'Cifra af. / angajat',
    revProfChart: 'Cifra de afaceri & Profit', expChart: 'Structura cheltuielilor', assetChart: 'Structura activelor',
    marginChart: 'Evoluția marjei de profit', bsComp: 'Compoziția bilanțului', bsYoy: 'Variație anuală',
    bsSideBySide: 'Comparație bilanț — ambele companii', plSideBySide: 'Comparație P&L — ambele companii',
    combinedTotal: 'Total combinat', stackedChart: 'Contribuție la totalul combinat', delta: 'Δ',
    bsTitle: 'Bilanț prescurtat', plTitle: 'Contul prescurtat de profit și pierdere',
    item: 'Element', change: 'Variație', pctChange: '% Variație',
    revExpProf: 'Venituri vs Cheltuieli vs Profit', costStruct: 'Structura costurilor',
    askTitle: 'Întreabă despre datele tale', askPlaceholder: 'Pune o întrebare despre datele financiare...',
    ask: 'Întreabă', showing: 'Afișează',
    qProfit: 'Care e mai profitabilă?', qCombined: 'Cifra de afaceri combinată?', qExpenses: 'Structura cheltuielilor',
    qRevEmp: 'Cifra af. / angajat', qGrowth: 'Creștere anuală', qBigExp: 'Cele mai mari cheltuieli?',

// ─── HELPERS ───
function t(key) { return T[lang][key] || key; }

function cv(val) {
  if (val == null || isNaN(val)) return null;
  return currency === 'EUR' ? val / EUR_RATE : val;
}

function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  const v = cv(n);
  return new Intl.NumberFormat(lang === 'ro' ? 'ro-RO' : 'it-IT').format(Math.round(v));
}

function fmtK(n) {
  if (n == null || isNaN(n)) return '-';
  const v = cv(n);
  if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(1) + 'M';
  if (Math.abs(v) >= 1000) return (v/1000).toFixed(0) + 'K';
  return new Intl.NumberFormat(lang === 'ro' ? 'ro-RO' : 'it-IT').format(Math.round(v));
}

function fmtRaw(n) {
  if (n == null || isNaN(n)) return 0;
  return cv(n);
}

function cur() { return currency; }

function pct(curr, prev) {
  if (!prev || prev === 0) return null;
  return ((curr - prev) / Math.abs(prev) * 100);
}

function pctStr(curr, prev) {
  const p = pct(curr, prev);
  if (p === null) return '';
  return (p >= 0 ? '+' : '') + p.toFixed(1) + '%';
}

function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }
function getCompanies() { return currentView === 'BOTH' ? ['IFP', 'FILATO'] : [currentView]; }

// ─── ENHANCEMENT 1: KPI EXPLANATIONS ───
function kpiExplanation(type, value) {
  let text = '';
  if (type === 'revenue') text = t('whatItMeansRevenue');
  else if (type === 'profit') text = t('whatItMeansProfit');
  else if (type === 'margin') text = t('whatItMeansMargin');
  else if (type === 'assets') text = t('whatItMeansAssets');
  else if (type === 'expenses') text = t('whatItMeansExpenses');
  return `<div class="kpi-explanation">${text}</div>`;
}

// ─── ENHANCEMENT 2: TRAFFIC LIGHT DOTS ───
function trafficLight(metric, value, prev) {
  let color = 'green';
  if (metric === 'revenue') {
    const growth = pct(value, prev);
    if (growth === null || growth < 0) color = 'red';
    else if (growth < 5) color = 'yellow';
    else color = 'green';
  } else if (metric === 'margin') {
    if (value < 10) color = 'red';
    else if (value < 20) color = 'yellow';
    else color = 'green';
  } else if (metric === 'currentRatio') {
    if (value < 1) color = 'red';
    else if (value < 1.5) color = 'yellow';
    else color = 'green';
  } else if (metric === 'profit') {
    const growth = pct(value, prev);
    if (growth === null || growth < 0) color = 'red';
    else if (growth < 5) color = 'yellow';
    else color = 'green';
  } else if (metric === 'expenses') {
    const growth = pct(value, prev);
    if (growth === null || growth > 10) color = 'red';
    else if (growth > 0) color = 'yellow';
    else color = 'green';
  }
  return `<span class="tl-dot tl-${color}"></span>`;
}

    const rev24 = d.profit_loss["1. Net Turnover"]["2024"] || 0;

    const prof24 = d.profit_loss["7. Net Profit"]["2024"] || 0;
    const prof25 = d.profit_loss["7. Net Profit"]["2025"] || 0;
    const emp24 = d.employees["2024"] || 0;
    const emp25 = d.employees["2025"] || 0;
    const revGrowth = pctStr(rev25, rev24);
    const profGrowth = pctStr(prof25, prof24);
    const m24 = rev24 ? prof24 / rev24 * 100 : 0;
    const m25 = rev25 ? prof25 / rev25 * 100 : 0;

    return `${t('narrativeIn2025')}, ${key} ${t('narrativeRevenueOf')} ${fmtK(rev25)} ${cur()}, ${t('narrativeIncreaseFrom')} ${revGrowth} ${t('narrativeFrom2024')}. ${t('narrativeProfitGrew')} ${profGrowth} ${t('narrativeTo')} ${fmtK(prof25)} ${cur()}, ${t('narrativeMarginImproved')} ${m24.toFixed(1)}% ${t('narrativeTo')} ${m25.toFixed(1)}%. ${t('narrativeWorkforce')} ${emp24} ${t('narrativeTo')} ${emp25} ${t('narrativeToEmp')}.`;
  } else {
    const rev24_ifp = DATA.IFP.profit_loss["1. Net Turnover"]["2024"] || 0;
    const rev24_filato = DATA.FILATO.profit_loss["1. Net Turnover"]["2024"] || 0;
    const rev25_ifp = DATA.IFP.profit_loss["1. Net Turnover"]["2025"] || 0;
    const rev25_filato = DATA.FILATO.profit_loss["1. Net Turnover"]["2025"] || 0;
    const prof24_ifp = DATA.IFP.profit_loss["7. Net Profit"]["2024"] || 0;
    const prof24_filato = DATA.FILATO.profit_loss["7. Net Profit"]["2024"] || 0;
    const prof25_ifp = DATA.IFP.profit_loss["7. Net Profit"]["2025"] || 0;
    const prof25_filato = DATA.FILATO.profit_loss["7. Net Profit"]["2025"] || 0;
    const emp24_ifp = DATA.IFP.employees["2024"] || 0;
    const emp24_filato = DATA.FILATO.employees["2024"] || 0;
    const emp25_ifp = DATA.IFP.employees["2025"] || 0;
    const emp25_filato = DATA.FILATO.employees["2025"] || 0;

    const rev24 = rev24_ifp + rev24_filato;
    const rev25 = rev25_ifp + rev25_filato;
    const prof24 = prof24_ifp + prof24_filato;
    const prof25 = prof25_ifp + prof25_filato;
    const m24 = rev24 ? prof24 / rev24 * 100 : 0;
    const m25 = rev25 ? prof25 / rev25 * 100 : 0;
    const revGrowth = pctStr(rev25, rev24);
    const profGrowth = pctStr(prof25, prof24);
    const filato_pct = (rev25_filato / rev25 * 100).toFixed(0);

    return `${t('narrativeIn2025')}, ${t('narrativeGroup')} ${t('narrativeRevenueOf')} ${fmtK(rev25)} ${cur()}, ${t('narrativeIncreaseFrom')} ${revGrowth} ${t('narrativeFrom2024')}. ${t('narrativeProfitGrew')} ${profGrowth} ${t('narrativeTo')} ${fmtK(prof25)} ${cur()}, ${t('narrativeMarginImproved')} ${m24.toFixed(1)}% ${t('narrativeTo')} ${m25.toFixed(1)}%. ${t('narrativeWorkforce')} ${emp24_ifp + emp24_filato} ${t('narrativeTo')} ${emp25_ifp + emp25_filato} ${t('narrativeToEmp')}. FILATO ${t('narrativeContributes')} ${filato_pct}% ${t('narrativeOfGroupRevenue')}.`;
  }
}

// ─── ENHANCEMENT 5: CASH FLOW ESTIMATION ───
function generateCashFlowEstimate(companyKey) {
  const d = DATA[companyKey];
  const netProfit = d.profit_loss["7. Net Profit"]["2025"] || 0;
  const depreciation = d.profit_loss["4a. Depreciation"]["2025"] || 0;
  const inv24 = d.balance_sheet["I. Inventories"]["2024"] || 0;
  const inv25 = d.balance_sheet["I. Inventories"]["2025"] || 0;
  const rec24 = d.balance_sheet["II. Receivables"]["2024"] || 0;
  const rec25 = d.balance_sheet["II. Receivables"]["2025"] || 0;
  const cash24 = d.balance_sheet["IV. Cash and Bank"]["2024"] || 0;
  const cash25 = d.balance_sheet["IV. Cash and Bank"]["2025"] || 0;

  const invDelta = inv24 - inv25; // positive = cash freed
  const recDelta = rec24 - rec25; // positive = cash freed
  const cashDelta = cash25 - cash24;

  const operatingCash = netProfit + depreciation + invDelta + recDelta;

  let html = `<div class="narrative-card">
    <div style="font-size: 13px; line-height: 1.6; color: var(--text);">
      <div class="cashflow-item">
        <span class="cashflow-label">${t('startWithProfit')}</span>
        <span class="cashflow-value cashflow-add">${fmtK(netProfit)}</span>
      </div>
      <div class="cashflow-item">
        <span class="cashflow-label">${t('addBackDepreciation')} (${t('nonCash')})</span>
        <span class="cashflow-value cashflow-add">${fmtK(depreciation)}</span>
      </div>
      <div class="cashflow-item">
        <span class="cashflow-label">${t('inventoryChange')}</span>
        <span class="cashflow-value ${invDelta >= 0 ? 'cashflow-add' : 'cashflow-subtract'}">${invDelta >= 0 ? '+' : ''}${fmtK(invDelta)}</span>
      </div>
      <div class="cashflow-item">
        <span class="cashflow-label">${t('receivablesChange')}</span>
        <span class="cashflow-value ${recDelta >= 0 ? 'cashflow-add' : 'cashflow-subtract'}">${recDelta >= 0 ? '+' : ''}${fmtK(recDelta)}</span>
      </div>
      <div style="padding: 8px 0; border-top: 2px solid var(--surface2); font-weight: 600; display: flex; justify-content: space-between;">
        <span>${t('estimatedOperatingCash')}</span>
        <span class="${operatingCash >= 0 ? 'cashflow-add' : 'cashflow-subtract'}">${fmtK(operatingCash)}</span>

  return html;
}

// ─── EXPANDABLE ROW TOGGLE ───
function toggleExpand(tableId, parentIdx) {
  const parent = document.querySelector(`#${tableId} .parent-${parentIdx}`);
  const children = document.querySelectorAll(`#${tableId} .child-of-${parentIdx}`);
  if (!parent) return;
  const isOpen = parent.classList.contains('expanded');
  parent.classList.toggle('expanded');
  children.forEach(c => c.classList.toggle('visible'));
}

// ─── CHART DETAIL POPUP ───
function showChartPopup(title, rows, x, y) {
  closeChartPopup();
  const overlay = document.createElement('div');
  overlay.className = 'chart-popup-overlay';
  overlay.onclick = closeChartPopup;
  document.body.appendChild(overlay);

  const popup = document.createElement('div');
  popup.className = 'chart-popup';
  popup.id = 'active-chart-popup';

  let html = `<div class="popup-title">${title} <button class="popup-close" onclick="closeChartPopup()">&times;</button></div>`;
  rows.forEach(r => {
    html += `<div class="popup-row"><span class="popup-label">${r.label}</span><span class="popup-value ${r.cls||''}">${r.value}</span></div>`;
    if (r.bar != null) {
      html += `<div class="popup-bar-wrap"><div class="popup-bar" style="width:${Math.min(100,Math.max(2,r.bar))}%;background:${r.barColor||'var(--accent)'};"></div></div>`;
    }
    if (r.section) {
      html += `<div class="popup-section"><div class="popup-section-title">${r.section}</div></div>`;
    }
  });
  popup.innerHTML = html;

  // Position near click but keep on screen
  document.body.appendChild(popup);
  const rect = popup.getBoundingClientRect();
  let left = Math.min(x, window.innerWidth - rect.width - 16);
  let top = Math.min(y, window.innerHeight - rect.height - 16);
  left = Math.max(16, left);
  top = Math.max(16, top);
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}
function closeChartPopup() {
  document.querySelectorAll('.chart-popup').forEach(p => p.remove());
  document.querySelectorAll('.chart-popup-overlay').forEach(o => o.remove());
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeChartPopup(); });

// ─── TABBED POPUP SUPPORT ───
function showTabbedPopup(title, tabs, x, y) {
  closeChartPopup();
  const overlay = document.createElement('div');
  overlay.className = 'chart-popup-overlay';
  overlay.onclick = closeChartPopup;
  document.body.appendChild(overlay);

  const popup = document.createElement('div');
  popup.className = 'chart-popup';
  const popupId = 'popup-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
  popup.id = popupId;

  let html = `<div class="popup-title">${title} <button class="popup-close" onclick="closeChartPopup()">&times;</button></div>`;

  // Add tab buttons
  html += '<div class="popup-tabs">';
  tabs.forEach((tab, idx) => {
    html += `<button class="popup-tab ${idx===0?'active':''}" onclick="popupTabSwitch('${popupId}', ${idx})">${tab.label}</button>`;
  });
  html += '</div>';

  // Add tab contents
  tabs.forEach((tab, idx) => {
    html += `<div class="popup-tab-content ${idx===0?'active':''}" data-tab-idx="${idx}">${tab.content}</div>`;
  });

  popup.innerHTML = html;

  // Position near click but keep on screen
  document.body.appendChild(popup);
  const rect = popup.getBoundingClientRect();
  let left = Math.min(x, window.innerWidth - rect.width - 16);
  let top = Math.min(y, window.innerHeight - rect.height - 16);
  left = Math.max(16, left);
  top = Math.max(16, top);
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

function popupTabSwitch(popupId, tabIdx) {
  const popup = document.getElementById(popupId);
  if (!popup) return;

  // Deactivate all tabs and contents
  popup.querySelectorAll('.popup-tab').forEach(t => t.classList.remove('active'));
  popup.querySelectorAll('.popup-tab-content').forEach(c => c.classList.remove('active'));

  // Activate selected tab and content
  popup.querySelectorAll('.popup-tab')[tabIdx].classList.add('active');
  popup.querySelectorAll('.popup-tab-content')[tabIdx].classList.add('active');
}

// ─── ACCOUNT DETAIL HTML BUILDER ───
function buildAccountDetailHTML(accounts) {
  if (!accounts || accounts.length === 0) {
    return `<div style="padding:8px;color:var(--text2);font-size:12px;">${t('noDetailAvailable')}</div>`;
  }

  // Sort by amount descending
  const sorted = [...accounts].sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount));

  let html = `<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--surface2);">${t('fromTrialBalance')}</div>`;
  let total = 0;

  sorted.forEach(acc => {
    total += Math.abs(acc.amount);
  });

  sorted.forEach(acc => {
    html += `<div class="popup-acct-row">`;
    html += `<span class="popup-acct-code">${acc.code}</span>`;
    html += `<div style="flex:1;">`;
    html += `<span class="popup-acct-name">${acc.name}</span>`;
    if (acc.human) {
      html += `<div class="popup-acct-human">${acc.human}</div>`;
    }
    html += `</div>`;
    html += `<span class="popup-acct-amount">${fmt(acc.amount)} ${cur()}</span>`;
    html += `</div>`;

    if (acc.amount !== 0 && total > 0) {
      const barPct = (Math.abs(acc.amount) / total) * 100;
      html += `<div class="popup-acct-bar"><div class="popup-acct-bar-fill" style="width:${barPct}%"></div></div>`;
    }
  });

  // Total row
  if (sorted.length > 0) {
    html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--surface2);">`;
    html += `<div class="popup-acct-row">`;
    html += `<span style="font-weight:600;color:var(--accent);">TOTAL</span>`;
    html += `<span class="popup-acct-amount" style="font-weight:700;">${fmt(total)} ${cur()}</span>`;
    html += `</div>`;
    html += `</div>`;
  }

  return html;
}

// ─── DUAL COMPANY DETAIL HTML BUILDER ───
function buildDualDetailHTML(section, filterFn) {
  const companies = currentView === 'BOTH' ? ['IFP','FILATO'] : [currentView];
  const isBoth = companies.length > 1;

  if (!isBoth) {
    // Single company — use simple builder
    const tb = DATA[companies[0]].trial_balance;
    if (!tb || !tb[section]) return `<div style="padding:8px;color:var(--text2);font-size:12px;">${t('noDetailAvailable')}</div>`;
    const accounts = Object.entries(tb[section])
      .filter(([code, acc]) => filterFn(code, acc))
      .map(([code, acc]) => ({code, name: acc['name_'+lang], human: acc['human_'+lang], amount: acc.amount}));
    return buildAccountDetailHTML(accounts);
  }

  // BOTH mode — merge accounts by code into single rows
  const merged = {};
  companies.forEach(ck => {
    const tb = DATA[ck].trial_balance;
    if (!tb || !tb[section]) return;
    Object.entries(tb[section]).forEach(([code, acc]) => {
      if (!filterFn(code, acc)) return;
      if (!merged[code]) {
        merged[code] = { code, name: acc['name_'+lang], human: acc['human_'+lang], ifp: 0, filato: 0 };
      }
      merged[code][ck === 'IFP' ? 'ifp' : 'filato'] = acc.amount || 0;
    });
  });

  const rows = Object.values(merged).sort((a, b) => (Math.abs(b.ifp)+Math.abs(b.filato)) - (Math.abs(a.ifp)+Math.abs(a.filato)));
  if (rows.length === 0) return `<div style="padding:8px;color:var(--text2);font-size:12px;">${t('noDetailAvailable')}</div>`;

  let totalIFP = 0, totalFILATO = 0;
  rows.forEach(r => { totalIFP += Math.abs(r.ifp); totalFILATO += Math.abs(r.filato); });
  const grandTotal = totalIFP + totalFILATO;

  let html = `<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--surface2);">${t('fromTrialBalance')}</div>`;

  // Legend
  html += `<div style="display:flex;gap:12px;margin-bottom:10px;font-size:11px;">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--ifp);display:inline-block;"></span> IFP</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--filato);display:inline-block;"></span> FILATO</span>
  </div>`;

  rows.forEach(r => {
    const rowTotal = Math.abs(r.ifp) + Math.abs(r.filato);
    html += `<div class="popup-acct-row">`;
    html += `<span class="popup-acct-code">${r.code}</span>`;
    html += `<div style="flex:1;">`;
    html += `<span class="popup-acct-name">${r.name}</span>`;
    if (r.human) html += `<div class="popup-acct-human">${r.human}</div>`;
    html += `</div>`;
    // Two amounts side by side
    html += `<div style="text-align:right;min-width:180px;">`;
    if (r.ifp) html += `<span style="color:var(--ifp);font-size:12px;font-weight:600;">${fmt(r.ifp)}</span>`;
    if (r.ifp && r.filato) html += `<span style="color:var(--text2);font-size:10px;margin:0 4px;">|</span>`;
    if (r.filato) html += `<span style="color:var(--filato);font-size:12px;font-weight:600;">${fmt(r.filato)}</span>`;
    html += `<span style="color:var(--text2);font-size:10px;margin-left:3px;">${cur()}</span>`;
    html += `</div></div>`;

    // Dual-color bar
    if (rowTotal > 0 && grandTotal > 0) {
      const barMax = grandTotal;
      const ifpPct = (Math.abs(r.ifp) / barMax) * 100;
      const filatoPct = (Math.abs(r.filato) / barMax) * 100;
      html += `<div class="popup-acct-bar" style="display:flex;gap:1px;">`;
      if (r.ifp) html += `<div style="height:100%;width:${ifpPct}%;background:var(--ifp);border-radius:2px 0 0 2px;min-width:${r.ifp?1:0}px;"></div>`;
      if (r.filato) html += `<div style="height:100%;width:${filatoPct}%;background:var(--filato);border-radius:0 2px 2px 0;min-width:${r.filato?1:0}px;"></div>`;
      html += `</div>`;
    }
  });

  // Totals
  html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--surface2);">`;
  html += `<div class="popup-acct-row">`;
  html += `<span style="font-weight:600;color:var(--accent);">TOTAL</span>`;
  html += `<div style="text-align:right;min-width:180px;">`;
  html += `<span style="color:var(--ifp);font-weight:700;">${fmt(totalIFP)}</span>`;
  html += `<span style="color:var(--text2);font-size:10px;margin:0 4px;">|</span>`;
  html += `<span style="color:var(--filato);font-weight:700;">${fmt(totalFILATO)}</span>`;
  html += `<span style="color:var(--text2);font-size:10px;margin-left:3px;">${cur()}</span>`;
  html += `</div></div></div>`;

  return html;
}

// ─── BUILD EXPANDABLE TABLE ROW ───
function buildTableRow(item, idx, v24, v25, hierarchy, tableId, isBoth) {
  const change = v25 - v24;
  const p = pct(v25, v24);
  const isParent = hierarchy[idx] != null;
  const isChild = Object.values(hierarchy).some(arr => arr.includes(idx));
  const parentIdx = isChild ? Object.keys(hierarchy).find(k => hierarchy[k].includes(idx)) : null;

  let cls = item.isSub ? 'subtotal' : '';
  let extra = '';
  if (isParent) {
    cls += ' expandable-parent parent-' + idx;
    extra = ` onclick="toggleExpand('${tableId}',${idx})"`;
  }
  if (isChild) {
    cls += ' child-row child-of-' + parentIdx;
  }

  let childDetail = '';
  if (isChild && isBoth) {
    // Show per-company mini bars
    const dk = tableId.startsWith('bs') ? BS_DATA_KEYS[idx] : PL_DATA_KEYS[idx];
    const src = tableId.startsWith('bs') ? 'balance_sheet' : 'profit_loss';
    const iv = DATA.IFP[src][dk]?.["2025"]||0;
    const fv = DATA.FILATO[src][dk]?.["2025"]||0;
    const total = iv + fv;
    const iwPct = total > 0 ? (iv/total*100) : 0;
    const fwPct = total > 0 ? (fv/total*100) : 0;
    childDetail = `<span class="child-bar child-bar-ifp" style="width:${Math.max(2,iwPct*0.6)}px" title="IFP: ${fmt(iv)}"></span><span class="child-bar child-bar-filato" style="width:${Math.max(2,fwPct*0.6)}px" title="FILATO: ${fmt(fv)}"></span>`;
  }

  return `<tr class="${cls}"${extra}>
    <td><div class="td-item">${item.isSub?'<b>':''}${item[lang]}${item.isSub?'</b>':''} ${tooltip(item)} ${childDetail}</div></td>
    <td class="num">${fmt(v24)}</td><td class="num">${fmt(v25)}</td>
    <td class="num ${change>=0?'pos':'neg'}">${change>=0?'+':''}${fmt(change)}</td>
    <td class="num ${p!==null&&p>=0?'pos':'neg'}">${p!==null?pctStr(v25,v24):'-'}</td>
  </tr>`;
}

// ─── ATTACH CHART CLICK HANDLERS ───
function attachChartClick(chart, chartId, getDetailFn) {
  const canvas = chart.canvas;
  canvas.style.cursor = 'pointer';
  canvas.onclick = function(evt) {
    const elements = chart.getElementsAtEventForMode(evt, 'nearest', {intersect: true}, true);
    if (elements.length > 0) {
      const el = elements[0];
      const detail = getDetailFn(el.datasetIndex, el.index);
      if (detail) {
        const rect = canvas.getBoundingClientRect();
        showChartPopup(detail.title, detail.rows, rect.left + evt.offsetX + 10, rect.top + evt.offsetY + 10);
      }
    }
  };
}

// ─── CONTROLS RENDER ───
function renderControls() {
  document.getElementById('hdr-title').textContent = t('title');

  const c = document.getElementById('ctrl-bar');
  c.innerHTML = `
    <span class="label">${t('company')}</span>
    <button class="btn ${currentView==='IFP'?'ifp-active':''}" onclick="setView('IFP')">IFP</button>
    <button class="btn ${currentView==='FILATO'?'filato-active':''}" onclick="setView('FILATO')">FILATO</button>
    <button class="btn ${currentView==='BOTH'?'both-active':''}" onclick="setView('BOTH')">${t('both')}</button>
    <div class="separator"></div>
    <span class="label">${t('section')}</span>
    <button class="btn ${currentSection==='overview'?'active':''}" onclick="setSection('overview')">${t('overview')}</button>
    <button class="btn ${currentSection==='balance'?'active':''}" onclick="setSection('balance')">${t('balance')}</button>
    <button class="btn ${currentSection==='profitloss'?'active':''}" onclick="setSection('profitloss')">${t('profitloss')}</button>
    <button class="btn ${currentSection==='compare'?'active':''}" onclick="setSection('compare')">${t('compare')}</button>
    <button class="btn ${currentSection==='insights'?'active':''}" onclick="setSection('insights')">${t('insights')}</button>
    <button class="btn ${currentSection==='details'?'active':''}" onclick="setSection('details')">${t('details')}</button>
    <div class="separator"></div>
    <span class="label">${t('language')}</span>
    <button class="btn btn-sm ${lang==='ro'?'active':''}" onclick="setLang('ro')">🇷🇴 RO</button>
    <button class="btn btn-sm ${lang==='it'?'active':''}" onclick="setLang('it')">🇮🇹 IT</button>
    <div class="separator"></div>
    <span class="label">${t('currencyLabel')}</span>
    <button class="btn btn-sm ${currency==='RON'?'active':''}" onclick="setCurrency('RON')">RON (lei)</button>
    <button class="btn btn-sm ${currency==='EUR'?'active':''}" onclick="setCurrency('EUR')">EUR</button>
    ${currency==='EUR' ? `<span class="rate-note">${t('rateNote')}</span>` : ''}
  `;
}

function setView(v) { currentView = v; render(); }
function setSection(s) { currentSection = s; render(); }
function setLang(l) { lang = l; render(); }
function setCurrency(c) { currency = c; render(); }

function render() {
  destroyCharts();
  renderControls();
  const main = document.getElementById('main-content');
  if (currentSection === 'overview') renderOverview(main);
  else if (currentSection === 'balance') renderBalance(main);
  else if (currentSection === 'profitloss') renderPL(main);
  else if (currentSection === 'compare') renderCompare(main);
  else if (currentSection === 'insights') renderInsights(main);
  else if (currentSection === 'details') renderDetails(main);
}

function chartOpts(yFormat) {

      <td class="num">${fmtFn(fv["2024"]||0)}</td><td class="num">${fmtFn(fv["2025"]||0)}</td>
      <td class="num bold">${combined}</td></tr>`;

  charts['cm'] = new Chart(document.getElementById('ch-cm'),{type:'bar',data:{

      {label:'FILATO',data:[fmtRaw(DATA.FILATO.profit_loss["1. Net Turnover"]["2024"]),fmtRaw(DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]),fmtRaw(DATA.FILATO.profit_loss["7. Net Profit"]["2024"]),fmtRaw(DATA.FILATO.profit_loss["7. Net Profit"]["2025"])],backgroundColor:'rgba(16,185,129,0.7)',borderRadius:6}
    ]},options:chartOpts(true)});

  const ig = pct(DATA.IFP.profit_loss["1. Net Turnover"]["2025"],DATA.IFP.profit_loss["1. Net Turnover"]["2024"]);
  const fg = pct(DATA.FILATO.profit_loss["1. Net Turnover"]["2025"],DATA.FILATO.profit_loss["1. Net Turnover"]["2024"]);
  const ipg = pct(DATA.IFP.profit_loss["7. Net Profit"]["2025"],DATA.IFP.profit_loss["7. Net Profit"]["2024"]);
  const fpg = pct(DATA.FILATO.profit_loss["7. Net Profit"]["2025"],DATA.FILATO.profit_loss["7. Net Profit"]["2024"]);

    labels:[lang==='ro'?'Creștere venituri %':'Crescita fatturato %',lang==='ro'?'Creștere profit %':'Crescita utile %'],
    datasets:[{label:'IFP',data:[ig,ipg],backgroundColor:'rgba(59,130,246,0.7)',borderRadius:6},
      {label:'FILATO',data:[fg,fpg],backgroundColor:'rgba(16,185,129,0.7)',borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{x:{ticks:{color:'#94a3b8'}},y:{ticks:{color:'#94a3b8',callback:v=>v.toFixed(0)+'%'}}}}});

  const im = DATA.IFP.profit_loss["7. Net Profit"]["2025"]/DATA.IFP.profit_loss["1. Net Turnover"]["2025"]*100;
  const fm = DATA.FILATO.profit_loss["7. Net Profit"]["2025"]/DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]*100;
  const io = DATA.IFP.profit_loss["5. Other Operating Expenses"]["2025"]/DATA.IFP.profit_loss["1. Net Turnover"]["2025"]*100;
  const fo = DATA.FILATO.profit_loss["5. Other Operating Expenses"]["2025"]/DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]*100;
  charts['cr'] = new Chart(document.getElementById('ch-cr'),{type:'radar',data:{
    labels:[t('profitMargin')+' %',t('growth')+' %',t('opexRatio')+' %',t('empProd')],
    datasets:[{label:'IFP',data:[im,ig,io,DATA.IFP.profit_loss["1. Net Turnover"]["2025"]/DATA.IFP.employees["2025"]/100000],
      borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',pointBackgroundColor:'#3b82f6'},
      {label:'FILATO',data:[fm,fg,fo,DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]/DATA.FILATO.employees["2025"]/100000],
      borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',pointBackgroundColor:'#10b981'}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{r:{angleLines:{color:'#334155'},grid:{color:'#334155'},pointLabels:{color:'#94a3b8'},ticks:{color:'#64748b',backdropColor:'transparent'}}}}});

  setupQA();
}

function quickQ(topic) { answerTopic(topic); }
function askQuestion() {
  const q = (document.getElementById('qa-input').value || '').toLowerCase();
  if (q.includes('profit')) answerTopic('profitability');
  else if (q.includes('combin') || q.includes('total') || q.includes('cifra') || q.includes('fattur')) answerTopic('combined');
  else if (q.includes('cheltui') || q.includes('cost') || q.includes('expens') || q.includes('spese')) answerTopic('expenses');
  else if (q.includes('angaj') || q.includes('dipend') || q.includes('employ') || q.includes('prod')) answerTopic('revemp');
  else if (q.includes('crest') || q.includes('cresc') || q.includes('growth')) answerTopic('growth');
  else if (q.includes('cash') || q.includes('numerar') || q.includes('liquid') || q.includes('banca') || q.includes('cassa')) answerTopic('cash');
  else if (q.includes('stoc') || q.includes('scort') || q.includes('invent')) answerTopic('inventory');
  else answerTopic('summary');
}

function answerTopic(topic) {
  const r = document.getElementById('qa-results');
  r.style.display = 'block';
  const ifp = DATA.IFP, fil = DATA.FILATO;
  const c = cur();
  let a = '';

  if (topic === 'profitability') {
    const im = ifp.profit_loss["7. Net Profit"]["2025"]/ifp.profit_loss["1. Net Turnover"]["2025"]*100;
    const fm = fil.profit_loss["7. Net Profit"]["2025"]/fil.profit_loss["1. Net Turnover"]["2025"]*100;
    a = lang==='ro'
      ? `<b>Analiza profitabilității (2025):</b><br><br><b>FILATO</b> are o marjă de <b>${fm.toFixed(1)}%</b> (profit: ${fmt(fil.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><b>IFP</b> are o marjă de <b>${im.toFixed(1)}%</b> (profit: ${fmt(ifp.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><br>FILATO este mai profitabilă datorită cheltuielilor operaționale mai mici relative la venituri.`
      : `<b>Analisi redditività (2025):</b><br><br><b>FILATO</b> ha un margine di <b>${fm.toFixed(1)}%</b> (utile: ${fmt(fil.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><b>IFP</b> ha un margine di <b>${im.toFixed(1)}%</b> (utile: ${fmt(ifp.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><br>FILATO è più redditizia grazie ai costi operativi inferiori rispetto al fatturato.`;
  } else if (topic === 'combined') {
    const c24 = ifp.profit_loss["1. Net Turnover"]["2024"]+fil.profit_loss["1. Net Turnover"]["2024"];
    const c25 = ifp.profit_loss["1. Net Turnover"]["2025"]+fil.profit_loss["1. Net Turnover"]["2025"];
    a = lang==='ro'
      ? `<b>Cifra de afaceri combinată:</b><br>2024: <b>${fmt(c24)} ${c}</b><br>2025: <b>${fmt(c25)} ${c}</b><br>Creștere: <b>${pctStr(c25,c24)}</b>`
      : `<b>Fatturato combinato:</b><br>2024: <b>${fmt(c24)} ${c}</b><br>2025: <b>${fmt(c25)} ${c}</b><br>Crescita: <b>${pctStr(c25,c24)}</b>`;
  } else if (topic === 'expenses') {
    const ek = ["2. Cost of Materials & Goods","3. Employee Costs","4a. Depreciation","4b. Value Adj. Current Assets","5. Other Operating Expenses"];
    const labels = lang==='ro' ? ['Materii prime','Personal','Amortizare','Ajustări valoare','Alte chelt.'] : ['Materie prime','Personale','Ammortamento','Rettifiche','Altri costi'];
    a = `<b>${lang==='ro'?'Structura cheltuielilor 2025':'Ripartizione costi 2025'}:</b><br><br>`;
    ['IFP','FILATO'].forEach(k => {
      const pl = DATA[k].profit_loss;
      const total = ek.reduce((s,e)=>s+(pl[e]["2025"]||0),0);
      a += `<b>${k}:</b> ${lang==='ro'?'Total':'Totale'}: ${fmt(total)} ${c}<br>`;
      ek.forEach((e,i) => { const v=pl[e]["2025"]||0; a += `&nbsp;&nbsp;• ${labels[i]}: ${fmt(v)} ${c} (${(v/total*100).toFixed(1)}%)<br>`; });
      a += '<br>';
    });
  } else if (topic === 'revemp') {
    const ir = ifp.profit_loss["1. Net Turnover"]["2025"]/ifp.employees["2025"];
    const fr = fil.profit_loss["1. Net Turnover"]["2025"]/fil.employees["2025"];
    a = lang==='ro'
      ? `<b>Cifra de afaceri pe angajat (2025):</b><br><b>IFP:</b> ${ifp.employees["2025"]} angajați → <b>${fmt(ir)} ${c}/angajat</b><br><b>FILATO:</b> ${fil.employees["2025"]} angajați → <b>${fmt(fr)} ${c}/angajat</b>`
      : `<b>Fatturato per dipendente (2025):</b><br><b>IFP:</b> ${ifp.employees["2025"]} dipendenti → <b>${fmt(ir)} ${c}/dipendente</b><br><b>FILATO:</b> ${fil.employees["2025"]} dipendenti → <b>${fmt(fr)} ${c}/dipendente</b>`;
  } else if (topic === 'growth') {
    a = `<b>${lang==='ro'?'Creștere anuală 2024→2025':'Crescita annuale 2024→2025'}:</b><br><br>`;
    [['1. Net Turnover',t('revenue')],['7. Net Profit',t('netProfit')]].forEach(([k,n])=>{
      a += `<b>${n}:</b> IFP ${pctStr(ifp.profit_loss[k]["2025"],ifp.profit_loss[k]["2024"])} | FILATO ${pctStr(fil.profit_loss[k]["2025"],fil.profit_loss[k]["2024"])}<br>`;
    });
  } else if (topic === 'cash') {
    a = `<b>${lang==='ro'?'Poziția de numerar 2025':'Posizione liquidità 2025'}:</b><br>`;
    ['IFP','FILATO'].forEach(k=>{const d=DATA[k];
      a+=`<b>${k}:</b> ${lang==='ro'?'Casa și bănci':'Cassa e banche'}: <b>${fmt(d.balance_sheet["IV. Cash and Bank"]["2025"])} ${c}</b> (${pctStr(d.balance_sheet["IV. Cash and Bank"]["2025"],d.balance_sheet["IV. Cash and Bank"]["2024"])})<br>`;
    });
  } else if (topic === 'inventory') {
    a = `<b>${lang==='ro'?'Analiza stocurilor':'Analisi scorte'}:</b><br>`;
    ['IFP','FILATO'].forEach(k=>{const d=DATA[k];const inv=d.balance_sheet["I. Inventories"]["2025"];const rev=d.profit_loss["1. Net Turnover"]["2025"];
      a+=`<b>${k}:</b> ${fmt(inv)} ${c} (${(inv/rev*100).toFixed(1)}% ${lang==='ro'?'din cifra af.':'del fatturato'}, ${lang==='ro'?'rotație':'rotazione'}: ${(rev/inv).toFixed(1)}x)<br>`;
    });
  } else {
    const cp25 = ifp.profit_loss["7. Net Profit"]["2025"]+fil.profit_loss["7. Net Profit"]["2025"];
    const cr25 = ifp.profit_loss["1. Net Turnover"]["2025"]+fil.profit_loss["1. Net Turnover"]["2025"];
    a = lang==='ro'
      ? `<b>Rezumat 2025:</b><br>Cifra de afaceri combinată: <b>${fmt(cr25)} ${c}</b><br>Profit combinat: <b>${fmt(cp25)} ${c}</b><br>Total angajați: ${ifp.employees["2025"]+fil.employees["2025"]}`
      : `<b>Riepilogo 2025:</b><br>Fatturato combinato: <b>${fmt(cr25)} ${c}</b><br>Utile combinato: <b>${fmt(cp25)} ${c}</b><br>Totale dipendenti: ${ifp.employees["2025"]+fil.employees["2025"]}`;
  }
  r.innerHTML = a;
}

// Helper: get TB stats for a company
function tbStats(ck) {
  const d = DATA[ck], tb = d.trial_balance;
  if (!tb) return null;
  const totalRev = Object.values(tb.revenue).reduce((s,i) => s+(i.amount||0), 0);
  const totalExp = Object.values(tb.expenses).reduce((s,i) => s+(i.amount||0), 0);
  return { d, tb, totalRev, totalExp };
}

// Helper: build a dual-value string for category cards
function dualVal(ifpVal, filVal, isBoth) {
  if (!isBoth) return fmt(ifpVal || filVal);
  let s = '';
  if (ifpVal != null) s += `<span style="color:var(--ifp);">${fmt(ifpVal)}</span>`;
  if (ifpVal != null && filVal != null) s += `<span style="color:var(--text2);font-size:10px;margin:0 3px;">|</span>`;
  if (filVal != null) s += `<span style="color:var(--filato);">${fmt(filVal)}</span>`;
  return s;
}

function renderDetails(el) {
  const companies = getCompanies();
  const isBoth = companies.length > 1;

  }

  const stats = {};
  companies.forEach(ck => { stats[ck] = tbStats(ck); });

  let html = '<div style="max-width: 1400px;">';

  // Legend for BOTH mode
  if (isBoth) {
    html += `<div style="display:flex;gap:16px;margin-bottom:16px;font-size:13px;font-weight:600;">
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:2px;background:var(--ifp);display:inline-block;"></span> IFP</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:12px;height:12px;border-radius:2px;background:var(--filato);display:inline-block;"></span> FILATO</span>

    const np = s.d.profit_loss["7. Net Profit"]["2025"];
    const mx = Math.max(s.totalRev, 1);
    const wf = [{l:t('revenue'),v:s.totalRev,p:1,f:1.2},{o:'−'},{l:(lang==='ro'?'Cost mărfuri':'Costo merci')+' <span class="tooltip-wrap" style="display:inline-flex;vertical-align:middle;margin-left:2px;"><span class="info-icon" style="width:14px;height:14px;font-size:9px;">i</span><span class="tooltip-content" style="bottom:calc(100% + 6px)"><span class="tt-title">'+(lang==='ro'?'Cost Mărfuri Vândute (COGS)':'Costo del Venduto (COGS)')+'</span>'+(lang==='ro'?'Costul direct al mărfurilor cumpărate și revândute (cont 607). Reprezintă prețul de achiziție al produselor vândute clienților — cea mai mare componentă a cheltuielilor pentru o firmă de comerț.':'Il costo diretto delle merci acquistate e rivendute (conto 607). Rappresenta il prezzo di acquisto dei prodotti venduti ai clienti — la componente più grande delle spese per un\'azienda commerciale.')+'<div class="tt-law">'+(lang==='ro'?'OMFP 1802/2014 — Clasa 6, grupa 60':'OMFP 1802/2014 — Classe 6, gruppo 60')+'</div></span></span>',v:goodsT,p:0,f:.8},{o:'='},{l:lang==='ro'?'Marjă brută':'Margine lordo',v:gm,p:1,f:1.1},{o:'−'},{l:t('services')||'Servicii',v:servT,p:0,f:.9},{o:'−'},{l:t('personnel')||'Personal',v:persT,p:0,f:.5},{o:'−'},{l:t('materials')||'Materiale',v:matT,p:0,f:.4},{o:'−'},{l:t('taxes')||'Impozite',v:taxT,p:0,f:.4},{o:'='},{l:t('netProfit'),v:np,p:1,f:1}];
