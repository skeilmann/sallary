    html += `
      <div class="category-card" onclick="this.classList.toggle('expanded')">
        <div class="category-card-header">
          <div class="category-icon">${refCat.icon}</div>
          <div class="category-info">
            <div class="category-name">${catName}</div>
            <div class="category-amount">${isBoth ? dualVal(vals.IFP, vals.FILATO, true) + `<span style="color:var(--text);font-weight:700;margin-left:6px;">= ${fmt(combinedTotal)}</span>` : fmt(combinedTotal)} <span style="font-size:11px;color:var(--text2)">${cur()}</span></div>
            <div class="category-pct">${pctExp}% ${lang==='ro'?'din cheltuieli':'delle spese'}</div>
          </div>
        </div>
        ${isBoth && vals.IFP > 0 && vals.FILATO > 0 ? `<div style="display:flex;gap:1px;height:4px;border-radius:2px;overflow:hidden;margin:6px 0;">
          <div style="width:${vals.IFP/(vals.IFP+vals.FILATO)*100}%;background:var(--ifp)"></div>
          <div style="width:${vals.FILATO/(vals.IFP+vals.FILATO)*100}%;background:var(--filato)"></div>
        </div>` : ''}
        <div class="category-human">${catHuman}</div>
        <div class="category-items">${itemsHtml}</div>
      </div>`;
  });
  html += `</div>`;

  // WHERE THE MONEY COMES FROM (Revenue) — merged
  html += `<h2 style="font-size:18px;margin:32px 0 16px 0;font-weight:600;">${t('whereMoneyComesFrom')}</h2>`;
  html += `<div class="detail-grid">`;
  const revCatMap = {'707':'core_sales','704':'services','7583':'asset_sales','7651':'financial','767':'financial','7581':'other'};
  const allRevKeys = ['core_sales','services','asset_sales','financial','other'];
  const revTotals = {};
  allRevKeys.forEach(k => {
    let sum = 0;
    companies.forEach(ck => { const s = stats[ck]; if (s && s.tb.revenue_categories[k]) sum += s.tb.revenue_categories[k].total; });
    if (sum > 0) revTotals[k] = sum;
  });
  const revKeys = Object.keys(revTotals).sort((a,b) => revTotals[b] - revTotals[a]);

  revKeys.forEach(catKey => {
    const refCk = companies.find(ck => stats[ck]?.tb.revenue_categories[catKey]);
    const refCat = stats[refCk].tb.revenue_categories[catKey];
    const catName = lang==='ro'?refCat.name_ro:refCat.name_it;
    const catHuman = lang==='ro'?refCat.human_ro:refCat.human_it;
    const vals = {};
    companies.forEach(ck => { vals[ck] = stats[ck]?.tb.revenue_categories[catKey]?.total || 0; });
    const combinedTotal = companies.reduce((s,ck) => s + vals[ck], 0);
    const combinedRev = companies.reduce((s,ck) => s + (stats[ck]?.totalRev||0), 0);
    const pctRev = combinedRev > 0 ? (combinedTotal / combinedRev * 100).toFixed(1) : 0;

    let itemsHtml = '';
    const allAccounts = {};
    companies.forEach(ck => {
      const s = stats[ck]; if (!s) return;
      Object.entries(s.tb.revenue).forEach(([n, a]) => {
        if (revCatMap[n] !== catKey) return;
        if (!allAccounts[n]) allAccounts[n] = { name: lang==='ro'?a.name_ro:a.name_it };
        allAccounts[n][ck] = a.amount;
      });
    });
    Object.entries(allAccounts).forEach(([acctNum, info]) => {
      const rowTotal = (info.IFP||0) + (info.FILATO||0);
      const amountHtml = isBoth
        ? dualVal(info.IFP, info.FILATO, true) + `<span style="color:var(--text);font-weight:700;margin-left:6px;">= ${fmt(rowTotal)}</span>`
        : fmt(info[companies[0]]);
      itemsHtml += `<div class="category-item-row"><div class="category-item-name">${acctNum} ${info.name}</div><div class="category-item-amount">${amountHtml} <span style="font-size:10px;color:var(--text2)">${cur()}</span></div></div>`;
    });

    html += `
      <div class="category-card" onclick="this.classList.toggle('expanded')">
        <div class="category-card-header">
          <div class="category-icon">${refCat.icon}</div>
          <div class="category-info">
            <div class="category-name">${catName}</div>
            <div class="category-amount">${isBoth ? dualVal(vals.IFP, vals.FILATO, true) + `<span style="color:var(--text);font-weight:700;margin-left:6px;">= ${fmt(combinedTotal)}</span>` : fmt(combinedTotal)} <span style="font-size:11px;color:var(--text2)">${cur()}</span></div>
            <div class="category-pct">${pctRev}% ${lang==='ro'?'din venituri':'dei ricavi'}</div>
          </div>
        </div>
        <div class="category-human">${catHuman}</div>
        <div class="category-items">${itemsHtml}</div>
      </div>`;
  });
  html += `</div>`;

  // TOP INDIVIDUAL EXPENSES — merged table
  html += `<div class="table-card" style="margin-bottom:24px;">
    <h3>${t('topExpense')}</h3>
    <table class="top-expenses-table">
      <thead><tr><th>#</th><th>${lang==='ro'?'Cont':'Conto'}</th><th>${t('humanNote')}</th>${isBoth ? '<th class="num">IFP</th><th class="num">FILATO</th><th class="num">Total</th>' : `<th class="num">${lang==='ro'?'Sumă':'Importo'}</th>`}</tr></thead>
      <tbody>`;

  // Merge all expenses by account
  const mergedExp = {};
  companies.forEach(ck => {
    const s = stats[ck]; if (!s) return;
    Object.entries(s.tb.expenses).forEach(([n, a]) => {
      if (!mergedExp[n]) mergedExp[n] = { name: lang==='ro'?a.name_ro:a.name_it, human: lang==='ro'?a.human_ro:a.human_it };
      mergedExp[n][ck] = a.amount;
    });
  });
  Object.entries(mergedExp).map(([n,a])=>({acctNum:n,...a})).sort((a,b) => {
    const ta = companies.reduce((s,ck)=>s+(a[ck]||0),0);
    const tb2 = companies.reduce((s,ck)=>s+(b[ck]||0),0);
    return tb2 - ta;
  }).forEach((exp, idx) => {
    if (isBoth) {
      const rowTotal = (exp.IFP||0) + (exp.FILATO||0);
      html += `<tr><td><span class="rank-badge">${idx+1}</span></td><td>${exp.acctNum} ${exp.name}</td><td><span class="detail-note">${exp.human||''}</span></td><td class="num" style="color:var(--ifp)">${exp.IFP ? fmt(exp.IFP) : '—'}</td><td class="num" style="color:var(--filato)">${exp.FILATO ? fmt(exp.FILATO) : '—'}</td><td class="num" style="font-weight:700">${fmt(rowTotal)}</td></tr>`;
    } else {
      html += `<tr><td><span class="rank-badge">${idx+1}</span></td><td>${exp.acctNum} ${exp.name}</td><td><span class="detail-note">${exp.human||''}</span></td><td class="num">${fmt(exp[companies[0]]||0)}</td></tr>`;
    }
  });
  html += `</tbody></table></div>`;

  // CASH & LIQUIDITY — side by side
  html += `<h3 style="font-size:15px;font-weight:600;margin:24px 0 12px 0;">${t('cashBreakdown')}</h3>`;
  html += `<div class="cash-cards">`;
  const cashAccounts = ['5121','5124','5311'];
  let cashTotals = {};
  companies.forEach(ck => { cashTotals[ck] = 0; });

  cashAccounts.forEach(acct => {
    const vals = {};
    companies.forEach(ck => { const b = stats[ck]?.tb.balances[acct]; vals[ck] = b?.amount||0; cashTotals[ck] += vals[ck]; });
    const refCk = companies.find(ck => stats[ck]?.tb.balances[acct]);
    const label = refCk ? (lang==='ro' ? stats[refCk].tb.balances[acct].name_ro : stats[refCk].tb.balances[acct].name_it) : acct;
    html += `<div class="cash-card"><div class="cash-card-label">${label}</div><div class="cash-card-amount">${isBoth ? dualVal(vals.IFP, vals.FILATO, true) : fmt(vals[companies[0]])} <span style="font-size:10px;color:var(--text2)">${cur()}</span></div></div>`;
  });
  html += `<div class="cash-card" style="background:var(--surface);"><div class="cash-card-label" style="font-weight:600;">Total</div><div class="cash-card-amount" style="color:var(--accent2);">${isBoth ? dualVal(cashTotals.IFP, cashTotals.FILATO, true) : fmt(cashTotals[companies[0]])} <span style="font-size:10px;color:var(--text2)">${cur()}</span></div></div>`;
  html += `</div>`;

  // LIABILITIES — merged table
  html += `<div class="table-card" style="margin-bottom:24px;">
    <h3>${t('liabilitiesDetail')}</h3>
    <table class="top-expenses-table">
      <thead><tr><th>${lang==='ro'?'Cont':'Conto'}</th>${isBoth ? '<th class="num">IFP</th><th class="num">FILATO</th><th class="num">Total</th>' : `<th class="num">${lang==='ro'?'Sumă':'Importo'}</th>`}</tr></thead>
      <tbody>`;
  const mergedLiab = {};
  companies.forEach(ck => {
    const s = stats[ck]; if (!s) return;
    Object.entries(s.tb.balances).filter(([_,b])=>b.category==='liabilities').forEach(([n, a]) => {
      if (!mergedLiab[n]) mergedLiab[n] = { name: lang==='ro'?a.name_ro:a.name_it };
      mergedLiab[n][ck] = a.amount;
    });
  });
  Object.entries(mergedLiab).map(([n,a])=>({acctNum:n,...a})).sort((a,b) => {
    const ta = companies.reduce((s,ck)=>s+(a[ck]||0),0);
    const tb2 = companies.reduce((s,ck)=>s+(b[ck]||0),0);
    return tb2 - ta;
  }).forEach(liab => {
    if (isBoth) {
      const liabTotal = (liab.IFP||0) + (liab.FILATO||0);
      html += `<tr><td>${liab.acctNum} ${liab.name}</td><td class="num" style="color:var(--ifp)">${liab.IFP ? fmt(liab.IFP) : '—'}</td><td class="num" style="color:var(--filato)">${liab.FILATO ? fmt(liab.FILATO) : '—'}</td><td class="num" style="font-weight:700">${fmt(liabTotal)}</td></tr>`;
    } else {
      html += `<tr><td>${liab.acctNum} ${liab.name}</td><td class="num">${fmt(liab[companies[0]]||0)}</td></tr>`;
    }
  });
  html += `</tbody></table></div>`;

  // RELATED PARTY — per company
  companies.forEach(ck => {
    const s = stats[ck]; if (!s) return;
    const relParty = Object.entries(s.tb.balances).filter(([_,b])=>b.category==='related_party');
    if (relParty.length > 0) {
      html += `<div class="warning-card">
        <div class="warning-title">⚠️ ${lang==='ro'?'Tranzacții Entități Afiliate':'Transazioni Parti Correlate'}${isBoth?' — '+ck:''}</div>
        <div style="font-size:12px;color:var(--text2);margin:4px 16px 8px 16px;line-height:1.4;">${t('relatedPartyTx_expl')}</div>
        <div class="warning-content">`;
      relParty.forEach(([code, acc]) => {
        html += `<div class="warning-row"><div class="warning-label">${code} — ${lang==='ro'?acc.name_ro:acc.name_it}</div><div class="warning-value">${fmt(acc.amount)}</div></div>`;
      });
      const relTotal = relParty.reduce((sm,[_,a])=>sm+a.amount,0);
      html += `<p style="margin-top:12px;font-size:12px;line-height:1.5;">
        ${lang==='ro'
          ? `Total entități afiliate: ${fmt(relTotal)} ${cur()} — ${s.totalRev>0?(relTotal/s.totalRev*100).toFixed(0):'?'}% din venituri.`
          : `Totale parti correlate: ${fmt(relTotal)} ${cur()} — ${s.totalRev>0?(relTotal/s.totalRev*100).toFixed(0):'?'}% dei ricavi.`}
      </p></div></div>`;
    }
  });

  html += '</div>';
  el.innerHTML = html;
}

// ─── INSIGHTS SECTION ───
function renderInsights(el) {
  const companies = getCompanies();
  let html = '<div style="max-width: 1400px;">';

  companies.forEach(comp => {
    const d = DATA[comp];
    const name = d.short;
    const inf = d.informative;

    // Calculate financial health score
    const rev25 = d.profit_loss["1. Net Turnover"]["2025"];
    const profit25 = d.profit_loss["7. Net Profit"]["2025"];
    const assets25 = (d.balance_sheet["A. FIXED ASSETS TOTAL"]["2025"] || 0) + (d.balance_sheet["B. CURRENT ASSETS TOTAL"]["2025"] || 0);
    const liabilities25 = d.balance_sheet["D. Current Liabilities (<1yr)"]["2025"] || 0;
    const emp25 = d.employees["2025"] || 1;

    const profitMargin = rev25 > 0 ? (profit25 / rev25) * 100 : 0;
    const rev24 = d.profit_loss["1. Net Turnover"]["2024"];
    const revGrowth = rev24 > 0 ? ((rev25 - rev24) / rev24) * 100 : 0;
    const currentRatio = assets25 > 0 ? (d.balance_sheet["B. CURRENT ASSETS TOTAL"]["2025"] || 0) / Math.max(1, liabilities25) : 0;
    const debtRatio = assets25 > 0 ? liabilities25 / assets25 : 0;
    const assetTurnover = assets25 > 0 ? (rev25 / assets25) : 0;

    const healthScore = Math.min(100, Math.max(0,
      (Math.min(profitMargin / 30 * 100, 100) * 0.30) +  // profit margin 30%
      (Math.min(Math.max(revGrowth, -50) / 50 * 100, 100) * 0.20) +  // revenue growth 20%
      (Math.min(Math.max(currentRatio * 50, 0), 100) * 0.20) +  // liquidity 20%
      (Math.min(Math.max((1 - debtRatio) * 100, 0), 100) * 0.15) +  // debt ratio 15%
      (Math.min(assetTurnover * 50, 100) * 0.15)  // asset utilization 15%
    ));

    html += `<h2 style="margin-bottom:12px;font-size:18px;margin-top:24px;"><span class="company-badge ${comp === 'IFP' ? 'badge-ifp' : 'badge-filato'}">${name}</span></h2>`;

    // A. FINANCIAL HEALTH SCORE
    html += `<div class="charts-grid" style="grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 24px;">
      <div class="chart-card">
        <h3>${t('healthScore')}</h3>
        <div style="position:relative;width:180px;height:180px;margin:20px auto;">
          <canvas id="score-gauge-${comp}" style="max-width:100%;"></canvas>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
            <div style="font-size:48px;font-weight:700;color:var(--accent);">${healthScore.toFixed(0)}</div>
            <div style="font-size:12px;color:var(--text2);">/ 100</div>
          </div>
        </div>
      </div>
      <div class="chart-card">
        <h3>${t('profitabilityDive')}</h3>
        <table style="width:100%;font-size:13px;">
          <tr style="border-bottom:1px solid var(--surface2);">
            <td style="padding:8px;color:var(--text2);">${t('grossProfitMargin')}</td>
            <td style="padding:8px;text-align:right;font-weight:600;">${(profitMargin.toFixed(1))}%</td>
          </tr>
          <tr style="border-bottom:1px solid var(--surface2);">
            <td style="padding:8px;color:var(--text2);">${t('effectiveTaxRate')}</td>
            <td style="padding:8px;text-align:right;font-weight:600;">${inf.income_tax && inf.gross_profit ? ((inf.income_tax["2025"] / Math.max(inf.gross_profit["2025"], 1)) * 100).toFixed(1) : '-'}%</td>
          </tr>
          <tr style="border-bottom:1px solid var(--surface2);">
            <td style="padding:8px;color:var(--text2);">${t('operatingLeverage')}</td>
            <td style="padding:8px;text-align:right;font-weight:600;">${inf.total_op_income && inf.total_op_expenses ? (inf.total_op_income["2025"] / Math.max(inf.total_op_expenses["2025"], 1)).toFixed(2) : '-'}</td>
          </tr>
          <tr style="border-bottom:1px solid var(--surface2);">
            <td style="padding:8px;color:var(--text2);">${t('ebitda')}</td>
            <td style="padding:8px;text-align:right;font-weight:600;">${fmt((inf.gross_profit["2025"] || 0) + (d.profit_loss["4a. Depreciation"]["2025"] || 0))} ${cur()}</td>
          </tr>
          <tr>
            <td style="padding:8px;color:var(--text2);">${t('revExpRatio')}</td>
            <td style="padding:8px;text-align:right;font-weight:600;">${inf.total_income && inf.total_expenses_full ? (inf.total_income["2025"] / Math.max(inf.total_expenses_full["2025"], 1)).toFixed(2) : '-'}</td>
          </tr>
        </table>
      </div>
    </div>`;

    // B. SALARY & WORKFORCE ANALYTICS
    const monthlyGrossSal = emp25 > 0 ? (inf.gross_salaries["2025"] / 12 / emp25) : 0;
    const monthlyNetSal = emp25 > 0 ? (inf.net_salaries["2025"] / 12 / emp25) : 0;
    const taxBurdenEmp = emp25 > 0 ? (inf.salary_taxes["2025"] / 12 / emp25) : 0;
    const mealsEmp = emp25 > 0 ? (inf.meal_vouchers["2025"] / emp25) : 0;
    const salAsRev = rev25 > 0 ? ((inf.gross_salaries["2025"] / rev25) * 100) : 0;
    const prev25Sal = d.profit_loss["3. Employee Costs"]["2024"];
    const curr25Sal = d.profit_loss["3. Employee Costs"]["2025"];
    const salGrowth = prev25Sal > 0 ? ((curr25Sal - prev25Sal) / prev25Sal) * 100 : 0;

    html += `<div class="chart-card full" style="margin-bottom:24px;">
      <h3>${t('salaryWorkforce')}</h3>
      <div style="font-size:12px;color:var(--text2);margin:-8px 0 12px 0;line-height:1.4;">${t('salaryWorkforce_expl')}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;padding:12px 0;">
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('avgGrossSalary')}</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent);">${fmt(monthlyGrossSal)} ${cur()}</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('avgNetSalary')}</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent2);">${fmt(monthlyNetSal)} ${cur()}</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('salaryTaxBurden')}</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent3);">${fmt(taxBurdenEmp)} ${cur()}</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('mealsPerEmp')}</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent);">${fmt(mealsEmp)} ${cur()}</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('salaryAsRevenue')}</div>
          <div style="font-size:20px;font-weight:700;${salAsRev > 30 ? 'color:var(--danger)' : 'color:var(--accent2)'};">${salAsRev.toFixed(1)}%</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('salaryGrowth')}</div>
          <div style="font-size:20px;font-weight:700;${salGrowth >= 0 ? 'color:var(--accent2)' : 'color:var(--danger)'};">${(salGrowth >= 0 ? '+' : '')}${salGrowth.toFixed(1)}%</div>
        </div>
      </div>
    </div>`;

    // C. RELATED PARTY TRANSACTIONS
    const relPartyRecv = inf.related_party_receivables["2025"];
    const totalAssets = assets25;
    const relPartyPct = totalAssets > 0 ? (relPartyRecv / totalAssets) * 100 : 0;
    const warningClass = relPartyPct > 50 ? 'danger' : 'accent';

    html += `<div class="chart-card full" style="margin-bottom:24px;">
      <h3>${t('relatedPartyTx')}</h3>
      <div style="font-size:12px;color:var(--text2);margin:-8px 0 12px 0;line-height:1.4;">${t('relatedPartyTx_expl')}</div>
      <div style="padding:16px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px;">
          <div>
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('relatedPartyRecv')}</div>
            <div style="font-size:24px;font-weight:700;color:var(--${warningClass});">${fmt(relPartyRecv)} ${cur()}</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('asPercent')}</div>
            <div style="font-size:24px;font-weight:700;color:var(--${warningClass});">${relPartyPct.toFixed(1)}%</div>
          </div>
        </div>
        ${relPartyPct > 50 ? `<div style="padding:10px;background:rgba(239,68,68,0.1);border-left:3px solid var(--danger);border-radius:4px;color:var(--danger);font-size:13px;font-weight:600;">${t('warningDisproportionate')}</div>` : ''}
      </div>
    </div>`;

    // D. ASSET LIFECYCLE
    const fxd = d.fixed_assets;
    html += `<div class="charts-grid" style="grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
      <div class="chart-card">
        <h3>${t('fixedAssetMovements')}</h3>
        <div style="font-size:11px;color:var(--text2);margin:-4px 0 8px 0;line-height:1.4;">${t('fixedAssetMovements_expl')}</div>
        <table style="width:100%;font-size:12px;">
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;"><b>${lang==='ro'?'Corporale':'Tangibili'}</b></td><td style="padding:8px;text-align:right;color:var(--text2);">${t('openingBalance')}: ${fmt(fxd.tangible_gross.open)}</td></tr>
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;"></td><td style="padding:8px;text-align:right;color:var(--text2);">+ ${t('acquisitions')}: ${fmt(fxd.tangible_gross.acq)}</td></tr>
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;"></td><td style="padding:8px;text-align:right;color:var(--text2);">- ${t('disposals')}: ${fmt(fxd.tangible_gross.disp)}</td></tr>
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;"><b>${t('closingBalance')}</b></td><td style="padding:8px;text-align:right;font-weight:600;color:var(--accent);">${fmt(fxd.tangible_gross.close)}</td></tr>
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;padding-top:12px;"><b>${lang==='ro'?'Necorporale':'Intangibili'}</b></td><td style="padding:8px;text-align:right;color:var(--text2);">${fmt(fxd.intangible_gross.close)}</td></tr>
        </table>
      </div>
      <div class="chart-card">
        <h3>${t('assetLifecycle')}</h3>
        <div style="font-size:11px;color:var(--text2);margin:-4px 0 8px 0;line-height:1.4;">${t('assetLifecycle_expl')}</div>
        <table style="width:100%;font-size:12px;">
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;color:var(--text2);">${t('deprecCoverage')}</td><td style="padding:8px;text-align:right;font-weight:600;">${fxd.total_gross.close > 0 ? (fxd.total_depr.close / fxd.total_gross.close * 100).toFixed(1) : '-'}%</td></tr>
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;color:var(--text2);">${t('assetAge')}</td><td style="padding:8px;text-align:right;font-weight:600;">${fxd.total_gross.close > 0 ? ((fxd.total_depr.close / fxd.total_gross.close) * 100).toFixed(1) : '-'}%</td></tr>
          <tr style="border-bottom:1px solid var(--surface2);"><td style="padding:8px;color:var(--text2);">${lang==='ro'?'Amortizare perioadă':'Ammortamento periodo'}</td><td style="padding:8px;text-align:right;font-weight:600;">${fmt(fxd.total_depr.period)} ${cur()}</td></tr>
          <tr><td style="padding:8px;color:var(--text2);">${lang==='ro'?'Valoare netă contabilă':'Valore netto contabile'}</td><td style="padding:8px;text-align:right;font-weight:600;">${fmt((fxd.total_gross.close || 0) - (fxd.total_depr.close || 0))} ${cur()}</td></tr>
        </table>
      </div>
    </div>`;

    // E. TAX EFFICIENCY
    const effTaxRate = inf.gross_profit["2025"] > 0 ? ((inf.income_tax["2025"] / inf.gross_profit["2025"]) * 100) : 0;
    const deferredTaxAsset = inf.deferred_tax_asset["2025"] || 0;
    const deferredTaxLiab = inf.deferred_tax_liability["2025"] || 0;
    const netDeferredTax = deferredTaxAsset - deferredTaxLiab;

    html += `<div class="chart-card full" style="margin-bottom:24px;">
      <h3>${t('taxEfficiency')}</h3>
      <div style="font-size:12px;color:var(--text2);margin:-8px 0 12px 0;line-height:1.4;">${t('taxEfficiency_expl')}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;padding:12px 0;">
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('effectiveTaxRate')}</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent);">${effTaxRate.toFixed(1)}%</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('deferredTaxAsset')}</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent2);">${fmt(deferredTaxAsset)} ${cur()}</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">${t('deferredTaxLiab')}</div>
          <div style="font-size:20px;font-weight:700;${deferredTaxLiab > 0 ? 'color:var(--danger)' : 'color:var(--accent2)'};">${fmt(deferredTaxLiab)} ${cur()}</div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--surface2);">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:6px;">Net Deferred Tax</div>
          <div style="font-size:20px;font-weight:700;${netDeferredTax >= 0 ? 'color:var(--accent2)' : 'color:var(--danger)'};">${fmt(netDeferredTax)} ${cur()}</div>
        </div>
      </div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;

  // Create gauge charts for each company
  getCompanies().forEach(comp => {
    const d = DATA[comp];
    const rev25 = d.profit_loss["1. Net Turnover"]["2025"];
    const profit25 = d.profit_loss["7. Net Profit"]["2025"];
    const profitMargin = rev25 > 0 ? (profit25 / rev25) * 100 : 0;
    const rev24 = d.profit_loss["1. Net Turnover"]["2024"];
    const revGrowth = rev24 > 0 ? ((rev25 - rev24) / rev24) * 100 : 0;
    const assets25 = (d.balance_sheet["A. FIXED ASSETS TOTAL"]["2025"] || 0) + (d.balance_sheet["B. CURRENT ASSETS TOTAL"]["2025"] || 0);
    const liabilities25 = d.balance_sheet["D. Current Liabilities (<1yr)"]["2025"] || 0;

    const currentRatio = assets25 > 0 ? (d.balance_sheet["B. CURRENT ASSETS TOTAL"]["2025"] || 0) / Math.max(1, liabilities25) : 0;
    const debtRatio = assets25 > 0 ? liabilities25 / assets25 : 0;
    const assetTurnover = assets25 > 0 ? (rev25 / assets25) : 0;

    const healthScore = Math.min(100, Math.max(0,
      (Math.min(profitMargin / 30 * 100, 100) * 0.30) +
      (Math.min(Math.max(revGrowth, -50) / 50 * 100, 100) * 0.20) +
      (Math.min(Math.max(currentRatio * 50, 0), 100) * 0.20) +
      (Math.min(Math.max((1 - debtRatio) * 100, 0), 100) * 0.15) +
      (Math.min(assetTurnover * 50, 100) * 0.15)
    ));

    const canvasId = 'score-gauge-' + comp;
    const canvas = document.getElementById(canvasId);
    if (canvas) {
      charts['gauge_' + comp] = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: [t('healthScore')],
          datasets: [{
            data: [healthScore, 100 - healthScore],
            backgroundColor: [healthScore > 70 ? 'var(--accent2)' : healthScore > 40 ? 'var(--accent3)' : 'var(--danger)', 'var(--surface2)'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          circumference: 180,
          rotation: 270
        }
      });
    }
  });
}

// ─── INIT ───
render();
</script>
</body>
</html>
