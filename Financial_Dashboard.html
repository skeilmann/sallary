<title>Financial Dashboard - IFP & FILATO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --accent: #3b82f6;
    --accent2: #10b981; --accent3: #f59e0b; --danger: #ef4444;
    --ifp: #3b82f6; --filato: #10b981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); padding: 24px 32px; border-bottom: 1px solid var(--surface2); }
  .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .header p { color: var(--text2); font-size: 14px; }

  .controls { display: flex; gap: 10px; padding: 14px 32px; background: var(--surface); border-bottom: 1px solid var(--surface2); flex-wrap: wrap; align-items: center; }
  .btn { padding: 7px 16px; border: 1px solid var(--surface2); background: var(--bg); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .btn.ifp-active { background: var(--ifp); border-color: var(--ifp); }
  .btn.filato-active { background: var(--filato); border-color: var(--filato); }
  .btn.both-active { background: linear-gradient(135deg, var(--ifp), var(--filato)); border-color: var(--accent); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  .separator { width: 1px; height: 30px; background: var(--surface2); }
  .label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  .main { padding: 24px 32px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); position: relative; }
  .kpi-card .kpi-label { color: var(--text2); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .kpi-card .kpi-value { font-size: 26px; font-weight: 700; }
  .kpi-card .kpi-change { font-size: 13px; margin-top: 4px; }
  .kpi-card .kpi-change.positive { color: var(--accent2); }
  .kpi-card .kpi-change.negative { color: var(--danger); }
  .kpi-card .kpi-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .chart-card canvas { max-height: 350px; }

  .table-card { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); margin-bottom: 24px; overflow-x: auto; }
  .table-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--surface2); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .pos { color: var(--accent2); }
  .neg { color: var(--danger); }
  .bold { font-weight: 700; }
  .subtotal { background: rgba(255,255,255,0.03); font-weight: 600; }

  /* Tooltip styles */
  .info-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--surface2); color: var(--text2); font-size: 10px; font-weight: 700; cursor: help; position: relative; flex-shrink: 0; }
  .info-icon:hover { background: var(--accent); color: white; }

  .tooltip-wrap { position: relative; display: inline-flex; align-items: center; }
  .tooltip-content { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 1px solid var(--accent); border-radius: 10px; padding: 14px 16px; font-size: 12px; line-height: 1.5; color: var(--text); width: 340px; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: none; }
  .tooltip-content::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--accent); }
  .tooltip-wrap:hover .tooltip-content { display: block; }
  .tooltip-content .tt-title { font-weight: 700; color: var(--accent); margin-bottom: 4px; font-size: 12px; }
  .tooltip-content .tt-law { font-size: 10px; color: var(--accent3); margin-top: 6px; font-style: italic; }
  .tooltip-content .tt-law-ro { color: var(--accent2); }

  .td-item { display: flex; align-items: center; gap: 8px; }

  .chat-section { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--surface2); margin-bottom: 24px; }
  .chat-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 12px 16px; background: var(--bg); border: 1px solid var(--surface2); border-radius: 8px; color: var(--text); font-size: 14px; }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-btn { padding: 12px 24px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; }
  .chat-results { margin-top: 16px; padding: 16px; background: var(--bg); border-radius: 8px; font-size: 14px; line-height: 1.6; display: none; }
  .quick-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .quick-btn { padding: 6px 14px; background: var(--bg); border: 1px solid var(--surface2); border-radius: 20px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); }

  .company-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-ifp { background: rgba(59,130,246,0.2); color: var(--ifp); }
  .badge-filato { background: rgba(16,185,129,0.2); color: var(--filato); }

  .currency-tag { font-size: 14px; color: var(--text2); font-weight: 400; }
  .rate-note { font-size: 11px; color: var(--text2); font-style: italic; padding-left: 4px; }

  @media (max-width: 900px) {
    .charts-grid { grid-template-columns: 1fr; }
    .controls { padding: 10px 14px; gap: 6px; }
    .main { padding: 14px; }
    .tooltip-content { width: 260px; left: 0; transform: none; }
  }
</style>

// ─── HELPERS ───
function t(key) { return T[lang][key] || key; }

function cv(val) {
  if (val == null || isNaN(val)) return null;
  return currency === 'EUR' ? val / EUR_RATE : val;
}

function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  const v = cv(n);
  return new Intl.NumberFormat(lang === 'ro' ? 'ro-RO' : 'it-IT').format(Math.round(v));
}

function fmtK(n) {
  if (n == null || isNaN(n)) return '-';
  const v = cv(n);
  if (Math.abs(v) >= 1000000) return (v/1000000).toFixed(1) + 'M';
  if (Math.abs(v) >= 1000) return (v/1000).toFixed(0) + 'K';
  return new Intl.NumberFormat(lang === 'ro' ? 'ro-RO' : 'it-IT').format(Math.round(v));
}

function fmtRaw(n) {
  if (n == null || isNaN(n)) return 0;
  return cv(n);
}

function cur() { return currency; }

function pct(curr, prev) {
  if (!prev || prev === 0) return null;
  return ((curr - prev) / Math.abs(prev) * 100);
}

function pctStr(curr, prev) {
  const p = pct(curr, prev);
  if (p === null) return '';
  return (p >= 0 ? '+' : '') + p.toFixed(1) + '%';
}

function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }
function getCompanies() { return currentView === 'BOTH' ? ['IFP', 'FILATO'] : [currentView]; }

function tooltip(item) {
  const ttTitle = item['tt_' + lang] ? `<div class="tt-title">${item[lang]}</div>` : '';
  const ttBody = item['tt_' + lang] || '';
  const ttLaw = item['law_' + lang] || '';
  return `<span class="tooltip-wrap"><span class="info-icon">i</span><span class="tooltip-content">${ttTitle}${ttBody}${ttLaw ? `<div class="tt-law ${lang === 'ro' ? 'tt-law-ro' : ''}">${ttLaw}</div>` : ''}</span></span>`;
}

function plLabel(idx) { return PL_ITEMS[idx] ? PL_ITEMS[idx][lang] : ''; }

// ─── COMPARE ───
function renderCompare(el) {
  let html = `<div class="charts-grid">
    <div class="chart-card full"><h3>${t('sideBy')}</h3><canvas id="ch-cm"></canvas></div>
    <div class="chart-card"><h3>${t('revGrowth')}</h3><canvas id="ch-cg"></canvas></div>

  // Metrics table
  html += `<div class="table-card"><h3>${t('keyMetrics')}</h3>
  <table><thead><tr><th>${t('item')}</th><th class="num">IFP 2024</th><th class="num">IFP 2025</th><th class="num">FILATO 2024</th><th class="num">FILATO 2025</th><th class="num">${t('combined')} 2025</th></tr></thead><tbody>`;

  const metricsData = [
    {name: lang==='ro'?'Cifra de afaceri netă':'Fatturato netto', get:d=>d.profit_loss["1. Net Turnover"]},
    {name: lang==='ro'?'Profit net':'Utile netto', get:d=>d.profit_loss["7. Net Profit"]},
    {name: lang==='ro'?'Marja de profit %':'Margine profitto %', get:d=>({
      "2024":d.profit_loss["1. Net Turnover"]["2024"]?(d.profit_loss["7. Net Profit"]["2024"]/d.profit_loss["1. Net Turnover"]["2024"]*100):0,
      "2025":d.profit_loss["1. Net Turnover"]["2025"]?(d.profit_loss["7. Net Profit"]["2025"]/d.profit_loss["1. Net Turnover"]["2025"]*100):0}),isPct:true},
    {name: t('totalAssets'), get:d=>({"2024":(d.balance_sheet["A. FIXED ASSETS TOTAL"]["2024"]||0)+(d.balance_sheet["B. CURRENT ASSETS TOTAL"]["2024"]||0),"2025":(d.balance_sheet["A. FIXED ASSETS TOTAL"]["2025"]||0)+(d.balance_sheet["B. CURRENT ASSETS TOTAL"]["2025"]||0)})},

    {name: t('cashBank'), get:d=>d.balance_sheet["IV. Cash and Bank"]},

    {name: t('otherOp'), get:d=>d.profit_loss["5. Other Operating Expenses"]},
    {name: t('finIncome'), get:d=>d.profit_loss["6. Financial Income"]},
  ];

  metricsData.forEach(m => {
    const iv = m.get(DATA.IFP), fv = m.get(DATA.FILATO);
    const fmtFn = m.isPct ? v => v.toFixed(1)+'%' : (m.noConv ? v => new Intl.NumberFormat(lang==='ro'?'ro-RO':'it-IT').format(v) : fmt);
    const combined = m.isPct ? '-' : (m.noConv ? fmtFn((iv["2025"]||0)+(fv["2025"]||0)) : fmt((iv["2025"]||0)+(fv["2025"]||0)));
    html += `<tr><td class="bold">${m.name}</td>
      <td class="num">${fmtFn(iv["2024"]||0)}</td><td class="num">${fmtFn(iv["2025"]||0)}</td>
      <td class="num">${fmtFn(fv["2024"]||0)}</td><td class="num">${fmtFn(fv["2025"]||0)}</td>
      <td class="num bold">${combined}</td></tr>`;
  });

  charts['cm'] = new Chart(document.getElementById('ch-cm'),{type:'bar',data:{
    labels:[t('revenue')+' 2024',t('revenue')+' 2025',t('netProfit')+' 2024',t('netProfit')+' 2025'],
    datasets:[
      {label:'IFP',data:[fmtRaw(DATA.IFP.profit_loss["1. Net Turnover"]["2024"]),fmtRaw(DATA.IFP.profit_loss["1. Net Turnover"]["2025"]),fmtRaw(DATA.IFP.profit_loss["7. Net Profit"]["2024"]),fmtRaw(DATA.IFP.profit_loss["7. Net Profit"]["2025"])],backgroundColor:'rgba(59,130,246,0.7)',borderRadius:6},
      {label:'FILATO',data:[fmtRaw(DATA.FILATO.profit_loss["1. Net Turnover"]["2024"]),fmtRaw(DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]),fmtRaw(DATA.FILATO.profit_loss["7. Net Profit"]["2024"]),fmtRaw(DATA.FILATO.profit_loss["7. Net Profit"]["2025"])],backgroundColor:'rgba(16,185,129,0.7)',borderRadius:6}
    ]},options:chartOpts(true)});

  const ig = pct(DATA.IFP.profit_loss["1. Net Turnover"]["2025"],DATA.IFP.profit_loss["1. Net Turnover"]["2024"]);
  const fg = pct(DATA.FILATO.profit_loss["1. Net Turnover"]["2025"],DATA.FILATO.profit_loss["1. Net Turnover"]["2024"]);
  const ipg = pct(DATA.IFP.profit_loss["7. Net Profit"]["2025"],DATA.IFP.profit_loss["7. Net Profit"]["2024"]);
  const fpg = pct(DATA.FILATO.profit_loss["7. Net Profit"]["2025"],DATA.FILATO.profit_loss["7. Net Profit"]["2024"]);
  charts['cg'] = new Chart(document.getElementById('ch-cg'),{type:'bar',data:{
    labels:[lang==='ro'?'Creștere venituri %':'Crescita fatturato %',lang==='ro'?'Creștere profit %':'Crescita utile %'],
    datasets:[{label:'IFP',data:[ig,ipg],backgroundColor:'rgba(59,130,246,0.7)',borderRadius:6},
      {label:'FILATO',data:[fg,fpg],backgroundColor:'rgba(16,185,129,0.7)',borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{x:{ticks:{color:'#94a3b8'}},y:{ticks:{color:'#94a3b8',callback:v=>v.toFixed(0)+'%'}}}}});

  const im = DATA.IFP.profit_loss["7. Net Profit"]["2025"]/DATA.IFP.profit_loss["1. Net Turnover"]["2025"]*100;
  const fm = DATA.FILATO.profit_loss["7. Net Profit"]["2025"]/DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]*100;
  const io = DATA.IFP.profit_loss["5. Other Operating Expenses"]["2025"]/DATA.IFP.profit_loss["1. Net Turnover"]["2025"]*100;
  const fo = DATA.FILATO.profit_loss["5. Other Operating Expenses"]["2025"]/DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]*100;
  charts['cr'] = new Chart(document.getElementById('ch-cr'),{type:'radar',data:{
    labels:[t('profitMargin')+' %',t('growth')+' %',t('opexRatio')+' %',t('empProd')],
    datasets:[{label:'IFP',data:[im,ig,io,DATA.IFP.profit_loss["1. Net Turnover"]["2025"]/DATA.IFP.employees["2025"]/100000],
      borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',pointBackgroundColor:'#3b82f6'},
      {label:'FILATO',data:[fm,fg,fo,DATA.FILATO.profit_loss["1. Net Turnover"]["2025"]/DATA.FILATO.employees["2025"]/100000],
      borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',pointBackgroundColor:'#10b981'}]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#94a3b8'}}},scales:{r:{angleLines:{color:'#334155'},grid:{color:'#334155'},pointLabels:{color:'#94a3b8'},ticks:{color:'#64748b',backdropColor:'transparent'}}}}});

  setupQA();
}

      <button class="quick-btn" onclick="quickQ('revemp')">${t('qRevEmp')}</button>
      <button class="quick-btn" onclick="quickQ('growth')">${t('qGrowth')}</button>
      <button class="quick-btn" onclick="quickQ('cash')">${t('qCash')}</button>
      <button class="quick-btn" onclick="quickQ('inventory')">${t('qInventory')}</button>
    </div>
    <div class="chat-results" id="qa-results"></div></div>`;
}
function setupQA() {}
function quickQ(topic) { answerTopic(topic); }
function askQuestion() {
  const q = (document.getElementById('qa-input').value || '').toLowerCase();
  if (q.includes('profit')) answerTopic('profitability');
  else if (q.includes('combin') || q.includes('total') || q.includes('cifra') || q.includes('fattur')) answerTopic('combined');
  else if (q.includes('cheltui') || q.includes('cost') || q.includes('expens') || q.includes('spese')) answerTopic('expenses');
  else if (q.includes('angaj') || q.includes('dipend') || q.includes('employ') || q.includes('prod')) answerTopic('revemp');
  else if (q.includes('crest') || q.includes('cresc') || q.includes('growth')) answerTopic('growth');
  else if (q.includes('cash') || q.includes('numerar') || q.includes('liquid') || q.includes('banca') || q.includes('cassa')) answerTopic('cash');
  else if (q.includes('stoc') || q.includes('scort') || q.includes('invent')) answerTopic('inventory');
  else answerTopic('summary');
}

function answerTopic(topic) {
  const r = document.getElementById('qa-results');
  r.style.display = 'block';
  const ifp = DATA.IFP, fil = DATA.FILATO;
  const c = cur();
  let a = '';

  if (topic === 'profitability') {
    const im = ifp.profit_loss["7. Net Profit"]["2025"]/ifp.profit_loss["1. Net Turnover"]["2025"]*100;
    const fm = fil.profit_loss["7. Net Profit"]["2025"]/fil.profit_loss["1. Net Turnover"]["2025"]*100;
    a = lang==='ro'
      ? `<b>Analiza profitabilității (2025):</b><br><br><b>FILATO</b> are o marjă de <b>${fm.toFixed(1)}%</b> (profit: ${fmt(fil.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><b>IFP</b> are o marjă de <b>${im.toFixed(1)}%</b> (profit: ${fmt(ifp.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><br>FILATO este mai profitabilă datorită cheltuielilor operaționale mai mici relative la venituri.`
      : `<b>Analisi redditività (2025):</b><br><br><b>FILATO</b> ha un margine di <b>${fm.toFixed(1)}%</b> (utile: ${fmt(fil.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><b>IFP</b> ha un margine di <b>${im.toFixed(1)}%</b> (utile: ${fmt(ifp.profit_loss["7. Net Profit"]["2025"])} ${c}).<br><br>FILATO è più redditizia grazie ai costi operativi inferiori rispetto al fatturato.`;
  } else if (topic === 'combined') {
    const c24 = ifp.profit_loss["1. Net Turnover"]["2024"]+fil.profit_loss["1. Net Turnover"]["2024"];
    const c25 = ifp.profit_loss["1. Net Turnover"]["2025"]+fil.profit_loss["1. Net Turnover"]["2025"];
    a = lang==='ro'
      ? `<b>Cifra de afaceri combinată:</b><br>2024: <b>${fmt(c24)} ${c}</b><br>2025: <b>${fmt(c25)} ${c}</b><br>Creștere: <b>${pctStr(c25,c24)}</b>`
      : `<b>Fatturato combinato:</b><br>2024: <b>${fmt(c24)} ${c}</b><br>2025: <b>${fmt(c25)} ${c}</b><br>Crescita: <b>${pctStr(c25,c24)}</b>`;
  } else if (topic === 'expenses') {
    const ek = ["2. Cost of Materials & Goods","3. Employee Costs","4a. Depreciation","4b. Value Adj. Current Assets","5. Other Operating Expenses"];
    const labels = lang==='ro' ? ['Materii prime','Personal','Amortizare','Ajustări valoare','Alte chelt.'] : ['Materie prime','Personale','Ammortamento','Rettifiche','Altri costi'];
    a = `<b>${lang==='ro'?'Structura cheltuielilor 2025':'Ripartizione costi 2025'}:</b><br><br>`;
    ['IFP','FILATO'].forEach(k => {
      const pl = DATA[k].profit_loss;
      const total = ek.reduce((s,e)=>s+(pl[e]["2025"]||0),0);
      a += `<b>${k}:</b> ${lang==='ro'?'Total':'Totale'}: ${fmt(total)} ${c}<br>`;
      ek.forEach((e,i) => { const v=pl[e]["2025"]||0; a += `&nbsp;&nbsp;• ${labels[i]}: ${fmt(v)} ${c} (${(v/total*100).toFixed(1)}%)<br>`; });
      a += '<br>';
    });
  } else if (topic === 'revemp') {
    const ir = ifp.profit_loss["1. Net Turnover"]["2025"]/ifp.employees["2025"];
    const fr = fil.profit_loss["1. Net Turnover"]["2025"]/fil.employees["2025"];
    a = lang==='ro'
      ? `<b>Cifra de afaceri pe angajat (2025):</b><br><b>IFP:</b> ${ifp.employees["2025"]} angajați → <b>${fmt(ir)} ${c}/angajat</b><br><b>FILATO:</b> ${fil.employees["2025"]} angajați → <b>${fmt(fr)} ${c}/angajat</b>`
      : `<b>Fatturato per dipendente (2025):</b><br><b>IFP:</b> ${ifp.employees["2025"]} dipendenti → <b>${fmt(ir)} ${c}/dipendente</b><br><b>FILATO:</b> ${fil.employees["2025"]} dipendenti → <b>${fmt(fr)} ${c}/dipendente</b>`;
  } else if (topic === 'growth') {
    a = `<b>${lang==='ro'?'Creștere anuală 2024→2025':'Crescita annuale 2024→2025'}:</b><br><br>`;
    [['1. Net Turnover',t('revenue')],['7. Net Profit',t('netProfit')]].forEach(([k,n])=>{
      a += `<b>${n}:</b> IFP ${pctStr(ifp.profit_loss[k]["2025"],ifp.profit_loss[k]["2024"])} | FILATO ${pctStr(fil.profit_loss[k]["2025"],fil.profit_loss[k]["2024"])}<br>`;
    });
  } else if (topic === 'cash') {
    a = `<b>${lang==='ro'?'Poziția de numerar 2025':'Posizione liquidità 2025'}:</b><br>`;
    ['IFP','FILATO'].forEach(k=>{const d=DATA[k];
      a+=`<b>${k}:</b> ${lang==='ro'?'Casa și bănci':'Cassa e banche'}: <b>${fmt(d.balance_sheet["IV. Cash and Bank"]["2025"])} ${c}</b> (${pctStr(d.balance_sheet["IV. Cash and Bank"]["2025"],d.balance_sheet["IV. Cash and Bank"]["2024"])})<br>`;
    });
  } else if (topic === 'inventory') {
    a = `<b>${lang==='ro'?'Analiza stocurilor':'Analisi scorte'}:</b><br>`;
    ['IFP','FILATO'].forEach(k=>{const d=DATA[k];const inv=d.balance_sheet["I. Inventories"]["2025"];const rev=d.profit_loss["1. Net Turnover"]["2025"];
      a+=`<b>${k}:</b> ${fmt(inv)} ${c} (${(inv/rev*100).toFixed(1)}% ${lang==='ro'?'din cifra af.':'del fatturato'}, ${lang==='ro'?'rotație':'rotazione'}: ${(rev/inv).toFixed(1)}x)<br>`;
    });
  } else {
    const cp25 = ifp.profit_loss["7. Net Profit"]["2025"]+fil.profit_loss["7. Net Profit"]["2025"];
    const cr25 = ifp.profit_loss["1. Net Turnover"]["2025"]+fil.profit_loss["1. Net Turnover"]["2025"];
    a = lang==='ro'
      ? `<b>Rezumat 2025:</b><br>Cifra de afaceri combinată: <b>${fmt(cr25)} ${c}</b><br>Profit combinat: <b>${fmt(cp25)} ${c}</b><br>Total angajați: ${ifp.employees["2025"]+fil.employees["2025"]}`
      : `<b>Riepilogo 2025:</b><br>Fatturato combinato: <b>${fmt(cr25)} ${c}</b><br>Utile combinato: <b>${fmt(cp25)} ${c}</b><br>Totale dipendenti: ${ifp.employees["2025"]+fil.employees["2025"]}`;
  }
  r.innerHTML = a;
}

// ─── INIT ───
render();
</script>
</body>
</html>
